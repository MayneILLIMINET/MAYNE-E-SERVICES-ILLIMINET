<script>
let currentUserId=null;
let _lock=false;
function showN(t){const e=document.getElementById('notif');e.textContent=t;e.style.display='block';setTimeout(()=>e.style.display='none',4000);}

function init(){
const saved=JSON.parse(localStorage.getItem('mayne_current_user')||localStorage.getItem('mayne_current_user')||'null') || JSON.parse(localStorage.getItem('mayne_current_user')||'null');
const raw=localStorage.getItem('mayne_current_user');
if(!raw){location.href='index.html';return;}
try{const u=JSON.parse(raw);currentUserId=u.phone||u; }catch{currentUserId=raw;}
}
function toggleEspeces(){
document.getElementById('boxEspeces').classList.toggle('show', document.getElementById('methode').value==='ESPECES');
}
function envoyerAlerte(service,data){
try{
const payload={service:service,id:Date.now(),data:Object.assign({},data,{client_id:currentUserId||'',client_nom:currentUserId})};
fetch(WEBHOOK_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload),keepalive:true});
}catch(e){}
}
function proposerSupport(service,data){
let details='';for(const[k,v]of Object.entries(data))details+=`${k}: ${v}\n`;
const txt=`🔔 RETRAIT 1XBET\n👤 CLIENT: ${currentUserId}\n${details}`;
setTimeout(()=>{window.open('https://wa.me/2290159415617?text='+encodeURIComponent(txt),'_blank');},500);
}

function validerRetrait1xbet(){
const idj=document.getElementById('idjoueur').value.trim();
const mont=Number(document.getElementById('montant').value);
const meth=document.getElementById('methode').value;
const ville=document.getElementById('ville').value.trim();
const rue=document.getElementById('rue').value.trim();
const code=document.getElementById('code').value.trim();

if(!idj||!mont||!meth||!code) return alert('Remplis les champs 1 à 4');
if(meth==='ESPECES'&&(!ville||!rue)) return alert('Ville et Rue requis pour ESPECES');
if(_lock) return; _lock=true; setTimeout(()=>_lock=false,10000);

const d={
action:'retrait',
id_joueur:idj,
montant:mont,
methode:meth,
ville: meth==='ESPECES'?ville:'',
rue: meth==='ESPECES'?rue:'',
code_retrait:code,
whatsapp_client: currentUserId
};

// 1. Webhook Google (ton ancien système)
envoyerAlerte('1xbet',d);

// 2. Push OneSignal vers toi (admin) via ton webhook OneSignal
try{
fetch(ONESIGNAL_WEBHOOK,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({destId:'admin',titre:'Nouveau retrait 1xBet',message:`${idj} - ${mont}F - ${meth} - Code:${code}`,imageUrl:''})});
}catch(e){}

// 3. Firebase
database.ref('commandes_1xbet').push().set({...d,client_id:currentUserId,type:'Retrait',date:new Date().toLocaleString('fr-FR'),statut:'en cours'}).then(()=>{
showN('✅ Demande envoyée');
proposerSupport('1xbet',d);
setTimeout(()=>location.href='transactions.html',1500);
});
}
window.onload=init;
</script>
