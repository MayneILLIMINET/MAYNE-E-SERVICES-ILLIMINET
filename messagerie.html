<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Messagerie - MAYNE</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyDR0zDiGxisp4G-CDjltu8VFmxMMFjXI9E",authDomain:"mayneilliminetdb.firebaseapp.com",databaseURL:"https://mayneilliminetdb-default-rtdb.firebaseio.com",projectId:"mayneilliminetdb"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
const database=firebase.database();
</script>
<style>
*{box-sizing:border-box}html,body{margin:0;height:100dvh;overflow:hidden}body{background:#111;display:flex;justify-content:center;font-family:Arial}
.app-container{width:100%;max-width:430px;height:100dvh;background:#500;border:2px solid #fff;border-radius:10px;display:flex;flex-direction:column;overflow:hidden}
.user-header{flex-shrink:0;background:#4a0000;padding:10px;display:flex;justify-content:space-between;align-items:center}
.btn-logout{background:#500;color:#fff;border:2px solid #aaa;padding:5px 12px;border-radius:20px;font-size:10px}
#search-zone{flex-shrink:0;padding:8px;background:rgba(0,0,0,.25)}
.input-field{width:100%;padding:10px;border-radius:20px;border:2px solid #fff;background:#1e1e1e;color:#fff;text-align:center;font-weight:bold}
#messagerie-feed{flex:1;min-height:0;overflow-y:auto;padding:10px;display:flex;flex-direction:column}
#messagerie-feed.chat-mode{padding:0;overflow:hidden}
.chat-card{background:#3a0000;border-radius:12px;margin-bottom:8px;cursor:pointer}
.chat-header-list{display:flex;align-items:center;padding:10px;background:#aaaa;border-radius:12px}
.msg-avatar{width:42px;height:42px;border-radius:50%;background:#0084ff;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0}
.chat-wrapper{flex:1;min-height:0;height:100%;display:flex;flex-direction:column;background:#0b141a}
.chat-top{flex-shrink:0;height:60px;background:#202c33;color:#fff;display:flex;align-items:center;gap:10px;padding:0 12px}
.chat-container{flex:1;min-height:0;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:4px;background:#0b141a url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')}
.chat-input-bar{flex-shrink:0;height:62px;background:#202c33;display:flex;align-items:center;gap:8px;padding:8px 10px}

/* BULLE TEXTE */
.msg-bubble{max-width:75%;padding:8px 10px;border-radius:8px;font-size:14px;word-break:break-word}
.msg-left{background:#202c33;color:#e9edef;align-self:flex-start;border-top-left-radius:0}
.msg-right{background:#005c4b;color:#e9edef;align-self:flex-end;border-top-right-radius:0}
.msg-time{font-size:10px;color:#8696a0;margin-left:8px;float:right}

/* AUDIO WHATSAPP FORMAT */
.audio-bubble{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:12px;min-width:240px;max-width:300px;position:relative}
.audio-bubble.sent{background:#005c4b;align-self:flex-end;border-top-right-radius:0}
.audio-bubble.received{background:#202c33;align-self:flex-start;border-top-left-radius:0}
.audio-avatar{width:36px;height:36px;border-radius:50%;background:#0084ff;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0;font-size:14px}
.audio-play{width:36px;height:36px;border-radius:50%;background:#00a884;border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.audio-play.playing{background:#fff;color:#005c4b}
.wave-wrap{flex:1;display:flex;flex-direction:column;gap:3px}
.wave{display:flex;align-items:center;gap:2px;height:28px}
.wave span{width:3px;height:8px;background:#8696a0;border-radius:2px;display:inline-block}
.wave.playing span{background:#53bdeb;animation:waveAnim.8s infinite ease-in-out}
@keyframes waveAnim{0%,100%{height:8px}50%{height:22px}}
.audio-meta{display:flex;justify-content:space-between;font-size:10px;color:#8696a0}
</style>
</head>
<body>
<div class="app-container">
<div class="user-header"><div id="user-name" style="font-weight:bold;color:#fff">CHARGEMENT...</div><button class="btn-logout" onclick="location.href='index.html'">← ACCUEIL</button></div>
<div id="search-zone"><input type="text" id="recherche-user-input" class="input-field" placeholder="Rechercher..." oninput="rechercherUtilisateur()"><div id="resultats-recherche" style="margin-top:6px;max-height:140px;overflow-y:auto;background:#fff;border-radius:8px;display:none;"></div></div>
<div id="messagerie-feed"></div>
<input type="file" id="file-chat" accept="image/*" style="display:none" onchange="sendImageFile(this)">
</div>

<script>
let currentUserId=null, isRecording=false, mediaRecorder=null, audioChunks=[], currentAudio=null, currentBtn=null;
window.currentConvId=null;

async function uploadToCloudinary(base64){
  const fd=new FormData(); fd.append('file',base64); fd.append('upload_preset','mayneaudio');
  const r=await fetch("https://api.cloudinary.com/v1_1/dkzpkvidk/auto/upload",{method:'POST',body:fd});
  const j=await r.json(); if(!j.secure_url) throw new Error('upload'); return j.secure_url;
}
function pickImageChat(){ if(window.AppInventor){ window.AppInventor.setWebViewString('PICK_CHAT'); } else document.getElementById('file-chat').click(); }
async function sendImageFile(input){
  const f=input.files[0]; if(!f) return;
  const rd=new FileReader(); rd.onload=async e=>{
    try{ const url=await uploadToCloudinary(e.target.result);
      database.ref(`conversations/${window.currentConvId}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'image',url:url,createdAt:Date.now()});
    }catch(err){ alert('Erreur image'); }
  }; rd.readAsDataURL(f); input.value='';
}
function recordAudioChat(){
  if(window.AppInventor){
    if(!isRecording){ window.AppInventor.setWebViewString('REC_AUDIO_'+window.currentConvId); isRecording=true; document.getElementById('btn-rec').innerText='⏹️'; }
    else{ window.AppInventor.setWebViewString('STOP_AUDIO'); isRecording=false; document.getElementById('btn-rec').innerText='🎙️'; }
    return;
  }
  if(!isRecording){
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
      audioChunks=[]; mediaRecorder=new MediaRecorder(stream,{mimeType:'audio/webm;codecs=opus'});
      mediaRecorder.ondataavailable=e=>{ if(e.data.size>0) audioChunks.push(e.data); };
      mediaRecorder.onstop=async ()=>{
        const blob=new Blob(audioChunks,{type:'audio/webm'});
        const reader=new FileReader();
        reader.onloadend=async ()=>{
          try{ const url=await uploadToCloudinary(reader.result);
            database.ref(`conversations/${window.currentConvId}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'audio',url:url,createdAt:Date.now(),duration:Math.round(blob.size/16000)});
          }catch(e){ alert('Erreur vocal'); }
        };
        reader.readAsDataURL(blob); stream.getTracks().forEach(t=>t.stop());
      };
      mediaRecorder.start(); isRecording=true; document.getElementById('btn-rec').innerText='⏹️';
      document.getElementById('rec-indic').style.display='flex';
    }).catch(()=>alert('Micro refusé'));
  }else{
    if(mediaRecorder) mediaRecorder.stop(); isRecording=false; document.getElementById('btn-rec').innerText='🎙️'; document.getElementById('rec-indic').style.display='none';
  }
}
setInterval(()=>{
  if(!window.AppInventor) return;
  let d=window.AppInventor.getWebViewString(); if(!d) return;
  if(d.startsWith('CHAT_')){ let url=d.replace('CHAT_',''); window.AppInventor.setWebViewString(''); database.ref(`conversations/${window.currentConvId}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'image',url:url,createdAt:Date.now()}); }
  else if(d.startsWith('AUDIO_URL_')){ let url=d.replace('AUDIO_URL_',''); window.AppInventor.setWebViewString(''); isRecording=false; document.getElementById('btn-rec').innerText='🎙️'; database.ref(`conversations/${window.currentConvId}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'audio',url:url,createdAt:Date.now()}); }
  else if(d==='REC_STOP'){ window.AppInventor.setWebViewString(''); isRecording=false; document.getElementById('btn-rec').innerText='🎙️'; }
},500);

function rechercherUtilisateur(){
  const q=document.getElementById('recherche-user-input').value.trim().toLowerCase();
  const zone=document.getElementById('resultats-recherche');
  if(!q){zone.style.display='none';return;}
  database.ref('clients').once('value').then(s=>{let h='',c=0; s.forEach(ch=>{const cid=ch.key;const nom=ch.val().nom||'';if(cid===currentUserId)return;if(nom.toLowerCase().includes(q)||cid.includes(q)){c++;h+=`<div style="padding:10px;color:#000;border-bottom:1px solid #eee;cursor:pointer;font-weight:bold" onclick="selectionnerUserPourChat('${cid}','${nom.replace(/'/g,"\\'")}')">👤 ${nom} (${cid})</div>`;}}); zone.innerHTML=c?h:'<div style="padding:10px;color:#666">Aucun</div>';zone.style.display='block';});
}
function selectionnerUserPourChat(cid,nom){document.getElementById('recherche-user-input').value='';document.getElementById('resultats-recherche').style.display='none';ouvrirChat(cid,nom);}
function ouvrirChat(destId,nom){const id=[currentUserId,destId].sort().join('_');database.ref(`conversations/${id}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'text',texte:'Bonjour',createdAt:Date.now()}).then(()=>ouvrirConversation(id,nom));}

function chargerMessagerie(){
  if(window.currentConvId) return;
  database.ref('conversations').on('value',snap=>{
    if(window.currentConvId) return;
    const feed=document.getElementById('messagerie-feed'); let html='',convs=[];
    snap.forEach(ch=>{const convId=ch.key;if(!convId.includes(currentUserId))return;const msgs=ch.child('messages').val();if(!msgs)return;const arr=Object.values(msgs).sort((a,b)=>b.createdAt-a.createdAt);convs.push({id:convId,last:arr[0]});});
    convs.sort((a,b)=>b.last.createdAt-a.last.createdAt);
    convs.forEach(c=>{let nom=c.last.senderNom||'Utilisateur';const init=nom.substring(0,2).toUpperCase();const prev=c.last.type==='image'?'📷 Photo':c.last.type==='audio'?'🎙️ Vocal':(c.last.texte||'').substring(0,35);const h=new Date(c.last.createdAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});html+=`<div class="chat-card" onclick="ouvrirConversation('${c.id}','${nom.replace(/'/g,"\\'")}')"><div class="chat-header-list"><div class="msg-avatar">${init}</div><div style="flex:1;margin-left:10px;text-align:left"><div style="font-weight:bold;color:#fff">${nom}</div><div style="font-size:12px;color:#ddd">${prev}</div></div><div style="font-size:11px;color:#fff">${h}</div></div></div>`;});
    feed.classList.remove('chat-mode'); feed.innerHTML=html||'<div style="color:#fff;text-align:center;padding:30px">💬 Aucune conversation</div>';
  });
}
function retourListe(){ if(window.currentConvId){ database.ref(`conversations/${window.currentConvId}/messages`).off(); database.ref(`conversations/${window.currentConvId}/typing`).off(); } database.ref('conversations').off(); window.currentConvId=null; document.getElementById('search-zone').style.display='block'; const feed=document.getElementById('messagerie-feed'); feed.classList.remove('chat-mode'); feed.innerHTML=''; chargerMessagerie(); }

function playAudio(url,btn,durEl,waveEl){
  if(currentAudio){ currentAudio.pause(); if(currentBtn) currentBtn.innerText='▶'; if(currentBtn) currentBtn.classList.remove('playing'); if(waveEl) waveEl.classList.remove('playing'); }
  if(currentAudio && currentAudio.src===url && currentBtn===btn){ currentAudio=null; currentBtn=null; return; }
  const audio=new Audio(url); audio.crossOrigin="anonymous";
  currentAudio=audio; currentBtn=btn;
  btn.innerText='⏸'; btn.classList.add('playing'); waveEl.classList.add('playing');
  audio.onloadedmetadata=()=>{ if(durEl) durEl.innerText='0:'+String(Math.floor(audio.duration)).padStart(2,'0'); };
  audio.ontimeupdate=()=>{ if(durEl) durEl.innerText='0:'+String(Math.floor(audio.currentTime)).padStart(2,'0'); };
  audio.onended=()=>{ btn.innerText='▶'; btn.classList.remove('playing'); waveEl.classList.remove('playing'); durEl.innerText='0:15'; currentAudio=null; };
  audio.play().catch(()=>{ btn.innerText='▶'; waveEl.classList.remove('playing'); alert('Audio non lisible'); });
}

function ouvrirConversation(convId,nom){
  database.ref('conversations').off(); window.currentConvId=convId;
  const feed=document.getElementById('messagerie-feed'); document.getElementById('search-zone').style.display='none'; feed.classList.add('chat-mode');
  feed.innerHTML=`<div class="chat-wrapper">
    <div class="chat-top"><span onclick="retourListe()" style="font-size:24px;cursor:pointer">←</span><div class="msg-avatar" style="width:34px;height:34px;background:#fff;color:#075e54">${nom.substring(0,2).toUpperCase()}</div><div><div style="font-weight:bold">${nom}</div><div id="typing-indicator" style="font-size:11px;display:none;color:#53bdeb">en train d'écrire...</div><div id="online-text" style="font-size:11px;opacity:.7">hors ligne</div></div></div>
    <div class="chat-container" id="chat-scroll"></div>
    <div id="rec-indic" style="display:none;flex-shrink:0;background:#202c33;color:#f15c6d;padding:6px 12px;font-size:12px;align-items:center;gap:8px"><span style="width:8px;height:8px;background:red;border-radius:50%;display:inline-block;animation:blink 1s infinite"></span> Enregistrement...</div>
    <div class="chat-input-bar">
      <span style="font-size:22px;cursor:pointer;color:#8696a0" onclick="pickImageChat()">📷</span>
      <span id="btn-rec" style="font-size:20px;cursor:pointer;color:#8696a0" onclick="recordAudioChat()">🎙️</span>
      <input id="msg-input" placeholder="Message" style="flex:1;padding:10px 14px;border-radius:20px;border:none;outline:none;background:#2a3942;color:#fff" oninput="jeTape('${convId}')" onkeypress="if(event.key==='Enter')envoyerDirect('${convId}')">
      <button onclick="envoyerDirect('${convId}')" style="width:42px;height:42px;border-radius:50%;background:#00a884;color:#fff;border:none;font-size:18px">➤</button>
    </div>
  </div>`;

  database.ref(`conversations/${convId}/typing`).on('value',s=>{let e=false;s.forEach(ch=>{if(ch.key!==currentUserId&&ch.val())e=true;});document.getElementById('typing-indicator').style.display=e?'block':'none';});
  database.ref(`conversations/${convId}/messages`).orderByChild('createdAt').on('value',snap=>{
    const scroll=document.getElementById('chat-scroll'); if(!scroll)return; let html='';
    snap.forEach(m=>{
      const v=m.val(); const isMe=v.senderId===currentUserId; const h=new Date(v.createdAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
      if(v.type==='text'){
        html+=`<div style="display:flex;justify-content:${isMe?'flex-end':'flex-start'}"><div class="msg-bubble ${isMe?'msg-right':'msg-left'}">${v.texte}<span class="msg-time">${h}${isMe?(v.vu?' ✓✓':' ✓'):''}</span></div></div>`;
      }else if(v.type==='image'){
        html+=`<div style="display:flex;justify-content:${isMe?'flex-end':'flex-start'}"><div class="msg-bubble ${isMe?'msg-right':'msg-left'}" style="padding:3px"><img src="${v.url}" style="max-width:220px;border-radius:8px;display:block"><span class="msg-time">${h}</span></div></div>`;
      }else if(v.type==='audio'){
        const init=v.senderNom? v.senderNom.substring(0,2).toUpperCase() : 'AN';
        const waveId='wave_'+m.key; const durId='dur_'+m.key; const btnId='btn_'+m.key;
        // 18 barres aléatoires comme WhatsApp
        let bars=''; for(let i=0;i<22;i++){ let hh=6+Math.random()*18; bars+=`<span style="height:${hh}px"></span>`; }
        html+=`<div class="audio-bubble ${isMe?'sent':'received'}">
          <div class="audio-avatar">${init}</div>
          <button id="${btnId}" class="audio-play" onclick="playAudio('${v.url}',this,document.getElementById('${durId}'),document.getElementById('${waveId}'))">▶</button>
          <div class="wave-wrap"><div id="${waveId}" class="wave">${bars}</div><div class="audio-meta"><span id="${durId}">0:16</span><span>${h} ${isMe?'✓✓':''}</span></div></div>
        </div>`;
      }
      if(v.senderId!==currentUserId&&!v.vu) m.ref.update({vu:true});
    });
    scroll.innerHTML=html; requestAnimationFrame(()=>{scroll.scrollTop=scroll.scrollHeight;});
  });
}
function envoyerDirect(cid){const i=document.getElementById('msg-input');const t=i.value.trim();if(!t)return;database.ref(`conversations/${cid}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'text',vu:false,texte:t,createdAt:Date.now()});i.value='';}
function jeTape(cid){database.ref(`conversations/${cid}/typing/${currentUserId}`).set(true);clearTimeout(window.typTO);window.typTO=setTimeout(()=>{database.ref(`conversations/${cid}/typing/${currentUserId}`).set(false);},1500);}
function init(){let s=JSON.parse(localStorage.getItem('mayne_current_user')||'null');if(!s){location.href='index.html';return;}currentUserId=s.phone.replace(/[^0-9]/g,'');database.ref('clients/'+currentUserId).once('value').then(v=>{document.getElementById('user-name').innerText=v.val()?.nom||currentUserId;});chargerMessagerie();}
window.onload=init;
</script>
<style>@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}</style>
</body>
</html>
