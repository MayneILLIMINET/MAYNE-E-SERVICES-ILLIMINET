<!DOCTYPE html>
<html lang="fr">
<head>
<script>if(localStorage.getItem('mayne_pin_enabled')==='true' &&!sessionStorage.getItem('mayne_unlocked')){location.href='lock.html';}</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Messagerie - MAYNE</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyDR0zDiGxisp4G-CDjltu8VFmxMMFjXI9E",authDomain:"mayneilliminetdb.firebaseapp.com",databaseURL:"https://mayneilliminetdb-default-rtdb.firebaseio.com",projectId:"mayneilliminetdb"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
const database=firebase.database();
const ONESIGNAL_WEBHOOK='https://script.google.com/macros/s/AKfycbzoM5bqwSZm83RtFHaJK58ByQCqByYc2hCk58GA-97h0FTsC4cqca12cj38w0tf7jxv/exec';
</script>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100dvh;overflow:hidden}
body{background:#2b0000;display:flex;justify-content:center;font-family:Arial}
.app-container{width:100%;max-width:430px;height:100dvh;background:#500;border:2px solid #fff;border-radius:10px;display:flex;flex-direction:column;overflow:hidden}
.user-header{flex-shrink:0;background:#4a0000;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #fff}
.btn-logout{background:#500;color:#fff;border:2px solid #aaa;padding:5px 12px;font-size:10px;border-radius:20px}
.input-field{width:100%;padding:10px;border-radius:20px;border:2px solid #fff;background:#1e1e1e;color:#fff;text-align:center;font-weight:bold}
#messagerie-feed{flex:1;min-height:0;overflow-y:auto;padding:10px;display:flex;flex-direction:column}
#messagerie-feed.chat-mode{padding:0;overflow:hidden}
.chat-card{background:#3a0000;border-radius:12px;margin-bottom:8px;cursor:pointer}
.chat-header-list{display:flex;align-items:center;padding:10px;background:#aaaa;border-radius:12px}
.msg-avatar{width:42px;height:42px;border-radius:50%;background:#0084ff;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0}
.chat-preview{flex:1;min-width:0;margin-left:10px;text-align:left}.chat-name{font-weight:bold;color:#fff}.chat-last{font-size:12px;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-wrapper{flex:1;min-height:0;height:100%;display:flex;flex-direction:column;background:#e5ddd5}
.chat-top{flex-shrink:0;height:60px;background:#075e54;color:#fff;display:flex;align-items:center;gap:10px;padding:0 12px}
.chat-container{flex:1;min-height:0;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:3px}
.chat-input-bar{flex-shrink:0;height:62px;background:#1e1e1e;display:flex;align-items:center;gap:8px;padding:8px 10px;border-top:1px solid #333}
.msg-bubble{max-width:75%;padding:8px 10px;border-radius:8px;font-size:14px;word-break:break-word}
.msg-left{background:#fff;color:#000;align-self:flex-start;border-top-left-radius:0}
.msg-right{background:#dcf8c6;color:#000;align-self:flex-end;border-top-right-radius:0}
.msg-time{font-size:10px;color:#667781;margin-left:8px;float:right}
.chat-row{display:flex;margin:2px 0}
</style>
</head>
<body>
<div class="app-container">
<div class="user-header">
<div id="user-name" style="font-weight:bold;color:#fff">CHARGEMENT...</div>
<button class="btn-logout" onclick="location.href='index.html'">← ACCUEIL</button>
</div>
<div id="search-zone" style="flex-shrink:0;padding:8px;background:rgba(0,0,0,.25)">
<input type="text" id="recherche-user-input" class="input-field" placeholder="Rechercher Nom ou Numéro..." oninput="rechercherUtilisateur()">
<div id="resultats-recherche" style="margin-top:6px;max-height:140px;overflow-y:auto;background:#fff;border-radius:8px;display:none;"></div>
</div>
<div id="messagerie-feed"></div>
<input type="file" id="file-chat" accept="image/*" style="display:none" onchange="sendImageFile(this)">
</div>

<div id="custom-alert" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:9999;align-items:center;justify-content:center"><div style="background:#1e1e1e;color:#fff;padding:20px;border-radius:10px;max-width:300px;text-align:center"><div id="custom-alert-msg"></div><br><button style="width:100%;padding:10px;background:#2b8a3e;color:#fff;border:none;border-radius:6px" onclick="this.parentElement.parentElement.style.display='none'">OK</button></div></div>
<div id="custom-prompt" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:9999;align-items:center;justify-content:center"><div style="background:#fff;color:#000;padding:20px;border-radius:10px;max-width:320px;width:90%"><div id="custom-prompt-msg"></div><input id="custom-prompt-input" class="input-field" style="margin:12px 0;background:#fff;color:#000;border:2px solid #333"><div style="display:flex;gap:8px"><button style="flex:1;padding:10px;background:#ddd;border:none;border-radius:6px" onclick="document.getElementById('custom-prompt').style.display='none'">Annuler</button><button style="flex:1;padding:10px;background:#2b8a3e;color:#fff;border:none;border-radius:6px" onclick="hidePrompt(true)">OK</button></div></div></div>

<script>
let currentUserId=null,promptCallback=null,typingTimeout=null,isRecording=false,mediaRecorder=null,audioChunks=[];
window.currentConvId=null;

function showAlert(m){document.getElementById('custom-alert-msg').innerText=m;document.getElementById('custom-alert').style.display='flex';}
function showInput(t,cb){promptCallback=cb;document.getElementById('custom-prompt-msg').innerText=t;document.getElementById('custom-prompt-input').value='';document.getElementById('custom-prompt').style.display='flex';}
function hidePrompt(ok){document.getElementById('custom-prompt').style.display='none';if(ok&&promptCallback)promptCallback(document.getElementById('custom-prompt-input').value.trim());}
async function pushJS(destId,titre,msg){if(!destId||destId===currentUserId)return;try{await fetch(ONESIGNAL_WEBHOOK,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({destId,titre,message:msg})});}catch(e){}}

async function uploadToCloudinary(base64){
  const fd=new FormData(); fd.append('file',base64); fd.append('upload_preset','mayneaudio');
  const res=await fetch("https://api.cloudinary.com/v1_1/dkzpkvidk/auto/upload",{method:'POST',body:fd});
  const data=await res.json(); if(!data.secure_url) throw new Error('Upload fail'); return data.secure_url;
}

function pickImageChat(){
  if(window.AppInventor){ window.AppInventor.setWebViewString('PICK_CHAT'); }
  else{ document.getElementById('file-chat').click(); }
}
async function sendImageFile(input){
  const f=input.files[0]; if(!f) return;
  if(f.size>4000000) return showAlert('Image trop lourde >4Mo');
  const r=new FileReader();
  r.onload=async e=>{
    try{
      const url=await uploadToCloudinary(e.target.result);
      if(!window.currentConvId) return;
      database.ref(`conversations/${window.currentConvId}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'image',url:url,createdAt:Date.now()});
    }catch(err){ showAlert('Erreur upload image'); }
  };
  r.readAsDataURL(f); input.value='';
}

function recordAudioChat(){
  if(window.AppInventor){
    if(!isRecording){
      window.AppInventor.setWebViewString('REC_AUDIO_'+window.currentConvId);
      isRecording=true; document.getElementById('btn-rec').innerText='⏹️';
      database.ref(`conversations/${window.currentConvId}/recording/${currentUserId}`).set(true);
    }else{
      window.AppInventor.setWebViewString('STOP_AUDIO');
      isRecording=false; document.getElementById('btn-rec').innerText='🎙️';
      database.ref(`conversations/${window.currentConvId}/recording/${currentUserId}`).set(false);
    }
    return;
  }
  // Fallback web
  if(!isRecording){
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
      audioChunks=[]; mediaRecorder=new MediaRecorder(stream);
      mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
      mediaRecorder.onstop=async ()=>{
        const blob=new Blob(audioChunks,{type:'audio/webm'});
        const reader=new FileReader();
        reader.onloadend=async ()=>{
          try{ const url=await uploadToCloudinary(reader.result);
            database.ref(`conversations/${window.currentConvId}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'audio',url:url,createdAt:Date.now()});
          }catch(e){showAlert('Erreur vocal');}
        };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.start(); isRecording=true; document.getElementById('btn-rec').innerText='⏹️';
    }).catch(()=>showAlert('Micro non autorisé'));
  }else{
    if(mediaRecorder) mediaRecorder.stop();
    isRecording=false; document.getElementById('btn-rec').innerText='🎙️';
  }
}

// Pont Kodular -> Web (IMAGES + VOCAUX)
setInterval(()=>{
  if(!window.AppInventor) return;
  let data=window.AppInventor.getWebViewString(); if(!data) return;
  if(data.startsWith('CHAT_')){
    let url=data.replace('CHAT_',''); window.AppInventor.setWebViewString('');
    if(window.currentConvId) database.ref(`conversations/${window.currentConvId}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'image',url:url,createdAt:Date.now()});
  }else if(data.startsWith('AUDIO_URL_')){
    let url=data.replace('AUDIO_URL_',''); window.AppInventor.setWebViewString('');
    if(window.currentConvId) database.ref(`conversations/${window.currentConvId}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'audio',url:url,createdAt:Date.now()});
  }else if(data==='REC_STOP'){
    window.AppInventor.setWebViewString(''); isRecording=false;
    const b=document.getElementById('btn-rec'); if(b) b.innerText='🎙️';
    if(window.currentConvId) database.ref(`conversations/${window.currentConvId}/recording/${currentUserId}`).set(false);
  }
},500);

function rechercherUtilisateur(){
  const q=document.getElementById('recherche-user-input').value.trim().toLowerCase();
  const zone=document.getElementById('resultats-recherche');
  if(!q){zone.style.display='none';return;}
  database.ref('clients').once('value').then(s=>{
    let h='',c=0; s.forEach(ch=>{const cid=ch.key;const nom=ch.val().nom||'';if(cid===currentUserId)return;if(nom.toLowerCase().includes(q)||cid.includes(q)){c++;h+=`<div style="padding:10px;color:#000;border-bottom:1px solid #eee;cursor:pointer;font-weight:bold" onclick="selectionnerUserPourChat('${cid}','${nom.replace(/'/g,"\\'")}')">👤 ${nom} (${cid})</div>`;}});
    zone.innerHTML=c?h:'<div style="padding:10px;color:#666">Aucun</div>';zone.style.display='block';
  });
}
function selectionnerUserPourChat(cid,nom){document.getElementById('recherche-user-input').value='';document.getElementById('resultats-recherche').style.display='none';ouvrirChat(cid,nom);}
function ouvrirChat(destId,nom){if(destId===currentUserId)return showAlert("C'est toi");showInput('Message à '+nom+' :',function(t){if(!t)return;const id=[currentUserId,destId].sort().join('_');database.ref(`conversations/${id}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'text',texte:t,createdAt:Date.now()}).then(()=>ouvrirConversation(id,nom));});}

function chargerMessagerie(){
  if(window.currentConvId) return;
  database.ref('conversations').on('value',snap=>{
    if(window.currentConvId) return;
    const feed=document.getElementById('messagerie-feed'); let html='',convs=[];
    snap.forEach(ch=>{const convId=ch.key;if(!convId.includes(currentUserId))return;const msgs=ch.child('messages').val();if(!msgs)return;const arr=Object.values(msgs).sort((a,b)=>b.createdAt-a.createdAt);convs.push({id:convId,last:arr[0]});});
    convs.sort((a,b)=>b.last.createdAt-a.last.createdAt);
    convs.forEach(c=>{let nom=c.last.senderNom||'Utilisateur';const init=nom.substring(0,2).toUpperCase();const prev=c.last.type==='image'?'📷 Photo':c.last.type==='audio'?'🎙️ Vocal':(c.last.texte||'').substring(0,35);const h=new Date(c.last.createdAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});html+=`<div class="chat-card" onclick="ouvrirConversation('${c.id}','${nom.replace(/'/g,"\\'")}')"><div class="chat-header-list"><div class="msg-avatar">${init}</div><div class="chat-preview"><div class="chat-name">${nom}</div><div class="chat-last">${c.last.senderId===currentUserId?'Vous: ':''}${prev}</div></div><div style="font-size:11px;color:#fff">${h}</div></div></div>`;});
    feed.classList.remove('chat-mode'); feed.innerHTML=html||'<div style="color:#fff;text-align:center;padding:30px">💬 Aucune conversation</div>';
  });
}
function retourListe(){
  if(window.currentConvId){
    database.ref(`conversations/${window.currentConvId}/messages`).off();
    database.ref(`conversations/${window.currentConvId}/typing`).off();
    database.ref(`conversations/${window.currentConvId}/recording`).off();
  }
  database.ref('conversations').off();
  window.currentConvId=null;
  document.getElementById('search-zone').style.display='block';
  const feed=document.getElementById('messagerie-feed'); feed.classList.remove('chat-mode'); feed.innerHTML='';
  chargerMessagerie();
}
function ouvrirConversation(convId,nom){
  database.ref('conversations').off();
  window.currentConvId=convId;
  const feed=document.getElementById('messagerie-feed');
  document.getElementById('search-zone').style.display='none';
  feed.classList.add('chat-mode');
  feed.innerHTML=`<div class="chat-wrapper">
    <div class="chat-top"><span onclick="retourListe()" style="font-size:24px;cursor:pointer">←</span><div class="msg-avatar" style="width:34px;height:34px;font-size:13px;background:#fff;color:#075e54">${nom.substring(0,2).toUpperCase()}</div><div style="line-height:1.2"><div style="font-weight:bold">${nom}</div><div id="typing-indicator" style="font-size:11px;display:none;color:#8eff8e">en train d'écrire...</div><div id="online-text" style="font-size:11px;opacity:.8">hors ligne</div></div></div>
    <div class="chat-container" id="chat-scroll"></div>
    <div class="chat-input-bar">
      <span style="font-size:22px;cursor:pointer;color:#fff" onclick="pickImageChat()">📷</span>
      <span id="btn-rec" style="font-size:20px;cursor:pointer;color:#fff" onclick="recordAudioChat()">🎙️</span>
      <input id="msg-input" placeholder="Message" style="flex:1;padding:10px 14px;border-radius:20px;border:none;outline:none;background:#2a2a2a;color:#fff" oninput="jeTape('${convId}')" onkeypress="if(event.key==='Enter')envoyerDirect('${convId}')">
      <button onclick="envoyerDirect('${convId}')" style="width:42px;height:42px;border-radius:50%;background:#0084ff;color:#fff;border:none;font-size:18px">➤</button>
    </div>
  </div>`;

  database.ref('clients/'+convId.split('_').find(id=>id!==currentUserId)+'/status').on('value',s=>{const t=document.getElementById('online-text');if(t)t.innerText=s.val()&&s.val().online?'en ligne':'hors ligne';});
  database.ref(`conversations/${convId}/typing`).on('value',s=>{let e=false;s.forEach(ch=>{if(ch.key!==currentUserId&&ch.val())e=true;});const el=document.getElementById('typing-indicator');if(el)el.style.display=e?'block':'none';});

  database.ref(`conversations/${convId}/messages`).orderByChild('createdAt').on('value',snap=>{
    const scroll=document.getElementById('chat-scroll'); if(!scroll)return;
    let html=''; snap.forEach(m=>{
      const v=m.val(); const isMe=v.senderId===currentUserId; const h=new Date(v.createdAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
      let cont=v.texte||'';
      if(v.type==='image') cont=`<img src="${v.url}" style="max-width:200px;border-radius:10px">`;
      if(v.type==='audio') cont=`<audio controls src="${v.url}" style="max-width:180px"></audio>`;
      html+=`<div class="chat-row" style="justify-content:${isMe?'flex-end':'flex-start'}"><div class="msg-bubble ${isMe?'msg-right':'msg-left'}">${cont}<span class="msg-time">${h}${isMe?(v.vu?' ✓✓':' ✓'):''}</span></div></div>`;
      if(v.senderId!==currentUserId&&!v.vu) m.ref.update({vu:true});
    });
    scroll.innerHTML=html; requestAnimationFrame(()=>{scroll.scrollTop=scroll.scrollHeight;});
  });
}
function envoyerDirect(cid){const i=document.getElementById('msg-input');const t=i.value.trim();if(!t)return;database.ref(`conversations/${cid}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'text',vu:false,texte:t,createdAt:Date.now()}).then(()=>{const d=cid.split('_').find(id=>id!==currentUserId);pushJS(d,"💬 Nouveau message",`${document.getElementById('user-name').innerText} : ${t}`);});i.value='';database.ref(`conversations/${cid}/typing/${currentUserId}`).set(false);}
function jeTape(cid){database.ref(`conversations/${cid}/typing/${currentUserId}`).set(true);clearTimeout(window.typTO);window.typTO=setTimeout(()=>{database.ref(`conversations/${cid}/typing/${currentUserId}`).set(false);},1500);}
function init(){let s=JSON.parse(localStorage.getItem('mayne_current_user')||'null');if(!s){location.href='index.html';return;}currentUserId=s.phone.replace(/[^0-9]/g,'');database.ref('clients/'+currentUserId).once('value').then(v=>{document.getElementById('user-name').innerText=v.val()?.nom||currentUserId;});chargerMessagerie();}
window.onload=init;
</script>
</body>
</html>
