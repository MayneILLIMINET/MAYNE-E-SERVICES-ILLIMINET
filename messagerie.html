<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Messagerie - MAYNE</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyDR0zDiGxisp4G-CDjltu8VFmxMMFjXI9E",authDomain:"mayneilliminetdb.firebaseapp.com",databaseURL:"https://mayneilliminetdb-default-rtdb.firebaseio.com",projectId:"mayneilliminetdb"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
const database=firebase.database();
</script>
<style>
*{box-sizing:border-box}html,body{margin:0;height:100dvh;overflow:hidden}body{background:#111;display:flex;justify-content:center;font-family:Arial}
.app-container{width:100%;max-width:430px;height:100dvh;background:#500;border:2px solid #fff;border-radius:10px;display:flex;flex-direction:column;overflow:hidden}
.user-header{flex-shrink:0;background:#4a0000;padding:10px;display:flex;justify-content:space-between;align-items:center}
.btn-logout{background:#500;color:#fff;border:2px solid #aaa;padding:5px 12px;border-radius:20px;font-size:10px}
.input-field{width:100%;padding:10px;border-radius:20px;border:2px solid #fff;background:#1e1e1e;color:#fff;text-align:center;font-weight:bold}
#messagerie-feed{flex:1;min-height:0;overflow-y:auto;padding:10px;display:flex;flex-direction:column}
#messagerie-feed.chat-mode{padding:0;overflow:hidden}
.chat-card{background:#6d4c41;border-radius:16px;margin-bottom:10px;cursor:pointer}
.chat-header-list{display:flex;align-items:center;padding:12px}
.msg-avatar{width:44px;height:44px;border-radius:50%;background:#0084ff;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0;font-size:16px}
.chat-wrapper{flex:1;min-height:0;height:100%;display:flex;flex-direction:column;background:#0b141a}
.chat-top{flex-shrink:0;height:60px;background:#202c33;color:#fff;display:flex;align-items:center;gap:10px;padding:0 12px}
.chat-container{flex:1;min-height:0;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;background:#0b141a}
.chat-input-bar{flex-shrink:0;height:62px;background:#202c33;display:flex;align-items:center;gap:8px;padding:8px 10px}
.msg-bubble{max-width:75%;padding:8px 10px;border-radius:8px;font-size:14px;word-break:break-word}
.msg-left{background:#202c33;color:#e9edef;align-self:flex-start;border-top-left-radius:0}
.msg-right{background:#005c4b;color:#e9edef;align-self:flex-end;border-top-right-radius:0}
.msg-time{font-size:10px;color:#8696a0;margin-left:8px;float:right}
/* AUDIO DARK - PLUS DE BLOC BLANC */
.audio-bubble{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:18px;min-width:260px;max-width:310px;background:#005c4b}
.audio-bubble.received{background:#202c33}
.audio-bubble.sent{background:#005c4b}
.audio-bubble audio{flex:1;height:36px;border-radius:20px;background:transparent;filter:invert(0.15) brightness(1.2);}
.audio-bubble audio::-webkit-media-controls-panel{background:#005c4b}
.audio-meta{font-size:10px;color:#8696a0;margin-left:46px;display:flex;justify-content:space-between;width:calc(100% - 46px)}
</style>
</head>
<body>
<div class="app-container">
<div class="user-header"><div id="user-name" style="font-weight:bold;color:#fff">CHARGEMENT...</div><button class="btn-logout" onclick="location.href='index.html'">← ACCUEIL</button></div>
<div id="search-zone" style="flex-shrink:0;padding:8px;background:rgba(0,0,0,.25)"><input type="text" id="recherche-user-input" class="input-field" placeholder="Rechercher..." oninput="rechercherUtilisateur()"><div id="resultats-recherche" style="margin-top:6px;max-height:140px;overflow-y:auto;background:#fff;border-radius:8px;display:none;"></div></div>
<div id="messagerie-feed"></div>
</div>
<script>
let currentUserId=null,isRecording=false;
window.currentConvId=null;
function pickImageChat(){ if(window.AppInventor) window.AppInventor.setWebViewString('PICK_CHAT'); }
function recordAudioChat(){ const b=document.getElementById('btn-rec'); if(!isRecording){ window.AppInventor.setWebViewString('REC_AUDIO_'+window.currentConvId); isRecording=true; b.innerText='⏹️'; } else{ window.AppInventor.setWebViewString('STOP_AUDIO'); isRecording=false; b.innerText='🎙️'; } }
setInterval(()=>{
  if(!window.AppInventor) return;
  let d=window.AppInventor.getWebViewString(); if(!d) return;
  if(d.startsWith('CHAT_')){ let u=d.replace('CHAT_',''); window.AppInventor.setWebViewString(''); database.ref(`conversations/${window.currentConvId}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'image',url:u,createdAt:Date.now()}); }
  else if(d.startsWith('AUDIO_URL_')){ let u=d.replace('AUDIO_URL_',''); window.AppInventor.setWebViewString(''); isRecording=false; const b=document.getElementById('btn-rec'); if(b) b.innerText='🎙️'; database.ref(`conversations/${window.currentConvId}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'audio',url:u,createdAt:Date.now()}); }
  else if(d==='REC_STOP'){ window.AppInventor.setWebViewString(''); isRecording=false; const b=document.getElementById('btn-rec'); if(b) b.innerText='🎙️'; }
},400);

function rechercherUtilisateur(){ const q=document.getElementById('recherche-user-input').value.trim().toLowerCase(); const zone=document.getElementById('resultats-recherche'); if(!q){zone.style.display='none';return;} database.ref('clients').once('value').then(s=>{let h='',c=0; s.forEach(ch=>{const cid=ch.key;const nom=ch.val().nom||'';if(cid===currentUserId)return;if(nom.toLowerCase().includes(q)||cid.includes(q)){c++;h+=`<div style="padding:10px;color:#000;border-bottom:1px solid #eee;cursor:pointer;font-weight:bold" onclick="selectionnerUserPourChat('${cid}','${nom.replace(/'/g,"\\'")}')">👤 ${nom} (${cid})</div>`;}}); zone.innerHTML=c?h:'<div style="padding:10px;color:#666">Aucun</div>';zone.style.display='block';});}
function selectionnerUserPourChat(cid,nom){document.getElementById('recherche-user-input').value='';document.getElementById('resultats-recherche').style.display='none';ouvrirConversation([currentUserId,cid].sort().join('_'),nom);}

// LISTE CORRIGEE - AFFICHE LE NOM DE L'AMI, PAS LE TIEN
function chargerMessagerie(){
  if(window.currentConvId) return;
  database.ref('conversations').once('value').then(snapConv=>{
    database.ref('clients').once('value').then(snapClients=>{
      if(window.currentConvId) return;
      const clients=snapClients.val()||{};
      const feed=document.getElementById('messagerie-feed');
      let convs=[];
      snapConv.forEach(ch=>{
        const convId=ch.key;
        if(!convId.includes(currentUserId)) return;
        const msgs=ch.child('messages').val();
        if(!msgs) return;
        const arr=Object.values(msgs).sort((a,b)=>b.createdAt-a.createdAt);
        convs.push({id:convId,last:arr[0]});
      });
      convs.sort((a,b)=>b.last.createdAt-a.last.createdAt);
      let html='';
      convs.forEach(c=>{
        const otherId=c.id.split('_').find(id=>id!==currentUserId);
        const amiNom = clients[otherId]?.nom || c.last.senderNom || otherId;
        const init=amiNom.substring(0,2).toUpperCase();
        const prev=c.last.type==='image'?'📷 Photo':c.last.type==='audio'?'🎙️ Vocal':(c.last.texte||'').substring(0,35);
        const h=new Date(c.last.createdAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        html+=`<div class="chat-card" onclick="ouvrirConversation('${c.id}','${amiNom.replace(/'/g,"\\'")}')"><div class="chat-header-list"><div class="msg-avatar">${init}</div><div style="flex:1;margin-left:12px;text-align:left;min-width:0"><div style="font-weight:bold;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${amiNom}</div><div style="font-size:12px;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.last.senderId===currentUserId?'Vous: ':''}${prev}</div></div><div style="font-size:11px;color:#fff;margin-left:8px">${h}</div></div></div>`;
      });
      feed.classList.remove('chat-mode');
      feed.innerHTML=html||'<div style="color:#fff;text-align:center;padding:30px">💬 Aucune conversation</div>';
      // écoute temps réel après
      database.ref('conversations').on('value',()=>{ if(!window.currentConvId) chargerMessagerie(); });
    });
  });
}

function retourListe(){ if(window.currentConvId){ database.ref(`conversations/${window.currentConvId}/messages`).off(); database.ref(`conversations/${window.currentConvId}/typing`).off(); database.ref(`conversations/${window.currentConvId}/recording`).off(); } database.ref('conversations').off(); window.currentConvId=null; document.getElementById('search-zone').style.display='block'; const f=document.getElementById('messagerie-feed'); f.classList.remove('chat-mode'); f.innerHTML=''; chargerMessagerie(); }
function retourAccueil(){ if(window.currentConvId){ retourListe(); return true; } return false; }

function ouvrirConversation(convId,nom){
  database.ref('conversations').off(); window.currentConvId=convId;
  const feed=document.getElementById('messagerie-feed'); document.getElementById('search-zone').style.display='none'; feed.classList.add('chat-mode');
  feed.innerHTML=`<div class="chat-wrapper"><div class="chat-top"><span onclick="retourListe()" style="font-size:24px;cursor:pointer">←</span><div class="msg-avatar" style="width:34px;height:34px;background:#fff;color:#075e54">${nom.substring(0,2).toUpperCase()}</div><div style="line-height:1.2"><div style="font-weight:bold">${nom}</div><div id="typing-indicator" style="font-size:11px;display:none;color:#53bdeb">en train d'écrire...</div><div id="online-text" style="font-size:11px;opacity:.7">hors ligne</div><div id="rec-indicator" style="font-size:11px;display:none;color:#f15c6d">enregistrement...</div></div></div><div class="chat-container" id="chat-scroll"></div><div class="chat-input-bar"><span style="font-size:22px;cursor:pointer;color:#8696a0" onclick="pickImageChat()">📷</span><span id="btn-rec" style="font-size:20px;cursor:pointer;color:#8696a0" onclick="recordAudioChat()">🎙️</span><input id="msg-input" placeholder="Message" style="flex:1;padding:10px 14px;border-radius:20px;border:none;outline:none;background:#2a3942;color:#fff" oninput="jeTape('${convId}')" onkeypress="if(event.key==='Enter')envoyerDirect('${convId}')"><button onclick="envoyerDirect('${convId}')" style="width:42px;height:42px;border-radius:50%;background:#00a884;color:#fff;border:none;font-size:18px">➤</button></div></div>`;
  const otherId=convId.split('_').find(id=>id!==currentUserId);
  database.ref('clients/'+otherId+'/status').on('value',s=>{ const el=document.getElementById('online-text'); if(!el) return; const on=s.val()&&s.val().online; el.innerText=on?'en ligne':'hors ligne'; el.style.color=on?'#53bdeb':'#8696a0'; });
  database.ref(`conversations/${convId}/typing`).on('value',s=>{let e=false;s.forEach(ch=>{if(ch.key!==currentUserId&&ch.val())e=true;});const el=document.getElementById('typing-indicator'); const onl=document.getElementById('online-text'); if(!el) return; el.style.display=e?'block':'none'; if(onl) onl.style.display=e?'none':'block'; });
  database.ref(`conversations/${convId}/recording`).on('value',s=>{let e=false;s.forEach(ch=>{if(ch.key!==currentUserId&&ch.val())e=true;});const el=document.getElementById('rec-indicator'); if(el) el.style.display=e?'flex':'none'; });
  database.ref(`conversations/${convId}/messages`).orderByChild('createdAt').on('value',snap=>{
    const scroll=document.getElementById('chat-scroll'); if(!scroll)return; let html='';
    snap.forEach(m=>{
      const v=m.val(); const isMe=v.senderId===currentUserId; const h=new Date(v.createdAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
      const tick=isMe?(v.vu?' <span style="color:#53bdeb">✓✓</span>':' <span style="color:#8696a0">✓</span>'):'';
      if(v.type==='text'){ html+=`<div style="display:flex;justify-content:${isMe?'flex-end':'flex-start'}"><div class="msg-bubble ${isMe?'msg-right':'msg-left'}">${v.texte}<span class="msg-time">${h}${tick}</span></div></div>`; }
      else if(v.type==='image'){ html+=`<div style="display:flex;justify-content:${isMe?'flex-end':'flex-start'}"><div class="msg-bubble ${isMe?'msg-right':'msg-left'}" style="padding:3px"><img src="${v.url}" style="max-width:220px;border-radius:8px;display:block"><span class="msg-time">${h}${tick}</span></div></div>`; }
      else if(v.type==='audio'){
        const init=v.senderNom? v.senderNom.substring(0,2).toUpperCase() : 'MA';
        html+=`<div style="display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'};margin:4px 0"><div class="audio-bubble ${isMe?'sent':'received'}"><div class="msg-avatar" style="width:36px;height:36px;font-size:13px">${init}</div><audio controls preload="metadata" src="${v.url}"></audio></div><div class="audio-meta"><span>🎙️</span><span>${h}${tick}</span></div></div>`;
      }
      if(v.senderId!==currentUserId&&!v.vu) m.ref.update({vu:true,vuAt:Date.now()});
    });
    scroll.innerHTML=html; requestAnimationFrame(()=>{scroll.scrollTop=scroll.scrollHeight;});
  });
}
function envoyerDirect(cid){const i=document.getElementById('msg-input');const t=i.value.trim();if(!t)return;database.ref(`conversations/${cid}/messages`).push({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'text',vu:false,texte:t,createdAt:Date.now()});i.value='';}
function jeTape(cid){database.ref(`conversations/${cid}/typing/${currentUserId}`).set(true);clearTimeout(window.typTO);window.typTO=setTimeout(()=>{database.ref(`conversations/${cid}/typing/${currentUserId}`).set(false);},1500);}
function init(){let s=JSON.parse(localStorage.getItem('mayne_current_user')||'null');if(!s){location.href='index.html';return;}currentUserId=s.phone.replace(/[^0-9]/g,'');database.ref('clients/'+currentUserId).once('value').then(v=>{document.getElementById('user-name').innerText=v.val()?.nom||currentUserId;});chargerMessagerie();const st=database.ref('clients/'+currentUserId+'/status');database.ref('.info/connected').on('value',ss=>{if(ss.val()){st.set({online:true,last:Date.now()});st.onDisconnect().set({online:false,last:Date.now()});}});}
window.onload=init;
</script>
</body>
</html>
