<div id="service-credit" class="sub-panel" style="display: none;">
    <h4 style="color: #0000ff; border-bottom: 2px solid #0000ff; margin-top: 0; padding-bottom: 5px;">Forfait & Crédit</h4>
    
    <div class="input-group">
        <label class="input-label" style="color:#000; font-weight: bold; font-size: 13px;">Sélectionner le Réseau :</label>
        <select id="forfait-reseau" class="select-field dark-field" style="width: 100%; padding: 10px; background-color: #000000; color: #ffffff; border: 2px solid #ffffff; border-radius: 6px; font-weight: bold;">
            <option value="MTN">MTN Bénin</option>
            <option value="MOOV">Moov Africa</option>
            <option value="CELTIS">Celtis Bénin</option>
        </select>
    </div>

    <div class="input-group" style="margin-top: 10px;">
        <label class="input-label" style="color:#000; font-weight: bold; font-size: 13px;">Type de forfait :</label>
        <select id="forfait-motif" class="select-field dark-field" style="width: 100%; padding: 10px; background-color: #000000; color: #ffffff; border: 2px solid #ffffff; border-radius: 6px; font-weight: bold;">
            <option value="CREDIT SIMPLE">CRÉDIT SIMPLE</option>
            <option value="FORFAIT APPEL">FORFAIT APPEL</option>
            <option value="INTERNET VOLUME">INTERNET VOLUME</option>
            <option value="ILLIMITE">ILLIMITÉ (Illiminet)</option>
        </select>
    </div>

    <div class="input-group" style="margin-top: 10px;">
        <label class="input-label" style="color:#000; font-weight: bold; font-size: 13px;">Numéro bénéficiaire :</label>
        <input type="text" id="forfait-numero" class="input-field dark-field" placeholder="Ex: 01XXXXXXXX" style="width: 100%; padding: 10px; background-color: #000000; color: #ffffff; border: 2px solid #ffffff; border-radius: 6px; font-weight: bold; text-align: center;">
    </div>

    <div class="input-group" style="margin-top: 10px;">
        <label class="input-label" style="color:#000; font-weight: bold; font-size: 13px;">Montant (FCFA) :</label>
        <input type="number" id="forfait-offre" class="input-field dark-field" placeholder="Ex: 500" min="100" style="width: 100%; padding: 10px; background-color: #000000; color: #ffffff; border: 2px solid #ffffff; border-radius: 6px; font-weight: bold; text-align: center;">
    </div>

    <button id="btn-acheter-forfait" class="btn-primary" style="width: 100%; background-color: #0000ff; color: white; border: none; padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 15px;">Acheter</button>
    <p id="forfait-status" class="status-msg" style="display: none; font-size: 13px; font-weight: bold; margin-top: 10px; text-align: center; color: #006600;"></p>
</div>
