<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYNE E-SERVICES</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        /* ... tout ton CSS inchangé ... */
        body {margin: 0; padding: 10px; font-family: Arial, sans-serif; background-color: #f0f0f0;}
        .app-container {max-width: 450px; margin: 10px auto; padding: 20px; background-color: #0000ff; border: 2px solid #ffffff; border-radius: 12px; color: white; box-shadow: 0px 4px 15px rgba(0,0,0,0.4); box-sizing: border-box; text-align: center; position: relative;}
        /* ... garde tout le reste du CSS que tu avais ... */
        .info-block-code {background-color: #fff; padding: 8px; border-radius: 5px; border: 1px solid #000; font-size: 12px; font-family: monospace; word-break: break-all; margin-top: 5px; color: #c0392b; font-weight: bold; text-align: center;}
    </style>
</head>
<body>
<!-- ... tout ton HTML inchangé jusqu’au bouton Payer maintenant ... -->
<div class="payment-container">
    <button type="button" id="pay-btn" class="btn-submit" style="background-color: #4CAF50 !important;" onclick="envoyerWhatsAppDepot()">Payer maintenant</button>
</div>
</div></div></div>

<script>
    function afficherFormulaireInscription() {
        document.getElementById('login-interface').style.display = 'none';
        document.getElementById('register-interface').style.display = 'block';
    }
    function afficherFormulaireConnexion() {
        document.getElementById('register-interface').style.display = 'none';
        document.getElementById('login-interface').style.display = 'block';
    }
    function switchService(panelId) {
        document.querySelectorAll('.sub-panel').forEach(function(p) { p.style.display = 'none'; });
        document.getElementById(panelId).style.display = 'block';
    }
    function toggleXbetMode(mode) {
        document.getElementById('tab-xbet-depot').classList.remove('active');
        document.getElementById('tab-xbet-retrait').classList.remove('active');
        if(mode === 'depot') {
            document.getElementById('tab-xbet-depot').classList.add('active');
            document.getElementById('xbet-depot-zone').style.display = 'block';
            document.getElementById('xbet-retrait-zone').style.display = 'none';
        } else {
            document.getElementById('tab-xbet-retrait').classList.add('active');
            document.getElementById('xbet-depot-zone').style.display = 'none';
            document.getElementById('xbet-retrait-zone').style.display = 'block';
        }
    }

    function updateCodeMarchand() {
        const reseau = document.getElementById('depot-reseau').value;
        const montant = document.getElementById('depot-montant').value || "montant";
        const zone = document.getElementById('zone-code-marchand');
        const affiche = document.getElementById('code-marchand-affiche');

        if(!reseau) { zone.style.display = "none"; return; }
        zone.style.display = "block";

        if(reseau === "MTN") {
            affiche.innerText = `*880*2*1*340807*${montant}#`;
        } else if(reseau === "MOOV") {
            affiche.innerText = `*855*4*1*307657*${montant}#`;
        } else if(reseau === "CELTIS") {
            affiche.innerText = `*889*6*1# (Entrer MAY01 puis le montant ${montant})`;
        }
    }

    // CONFIG FIREBASE
    let database = null;
    let currentUserId = null;
    let currentUserSolde = 0;

    try {
        const firebaseConfig = {
            apiKey: "AIzaSyDR0zDiGxisp4G-CDjltu8VFmxMMFjXI9E",
            authDomain: "mayneilliminetdb.firebaseapp.com",
            databaseURL: "https://mayneilliminetdb-default-rtdb.firebaseio.com/",
            projectId: "mayneilliminetdb",
            storageBucket: "mayneilliminetdb.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
    } catch(e) {
        console.error("Erreur Firebase : " + e.message);
    }    // Envoi WhatsApp dépôt + sauvegarde Firebase - MODIFIÉ SANS KKIAPAY
    function envoyerWhatsAppDepot() {
        const reseau = document.getElementById('depot-reseau').value;
        const montant = Number(document.getElementById('depot-montant').value);
        const code = document.getElementById('code-marchand-affiche').innerText;
        
        if(!reseau || !montant || montant < 100) {
            alert("Veuillez choisir un réseau et entrer un montant minimum 100 FCFA");
            return;
        }
        if(!currentUserId) {
            alert("Veuillez vous connecter d'abord");
            return;
        }

        const nom = document.getElementById('user-name').innerText;
        const date = new Date().toLocaleString('fr-FR');
        
        // 1. Enregistrer dans Firebase
        database.ref('commandes_depots').push().set({
            client_id: currentUserId,
            nom_client: nom,
            reseau: reseau,
            montant: montant,
            code_marchand: code,
            date: date,
            statut: "En attente"
        }).then(function() {
            // 2. Après sauvegarde, ouvrir WhatsApp
            const message = `NOUVEAU DEPOT MAYNE E-SERVICES%0A%0A` +
                            `Nom: ${nom}%0A` +
                            `Numéro client: ${currentUserId}%0A` +
                            `Réseau: ${reseau}%0A` +
                            `Montant: ${montant} FCFA%0A` +
                            `Code: ${code}%0A` +
                            `Date: ${date}%0A` +
                            `Statut: En attente`;
            
            window.open(`https://wa.me/2290159415617?text=${message}`, '_blank');
            
            alert("Demande enregistrée ! WhatsApp s'ouvre pour confirmation.");
            
            // Reset du formulaire
            document.getElementById('depot-montant').value = "";
            document.getElementById('depot-reseau').value = "";
            document.getElementById('zone-code-marchand').style.display = "none";
            
        }).catch(function(err) {
            alert("Erreur enregistrement Firebase : " + err.message);
        });
    }

    // Connexion
    function executerConnexion() {
        const id = document.getElementById('login-id').value.trim();
        const pin = document.getElementById('login-pin').value.trim();
        if(!id || !pin) { alert("Entrez votre numéro et votre code PIN"); return; }
        
        database.ref('clients/' + id).once('value').then(function(snapshot) {
            if(snapshot.exists()) {
                const data = snapshot.val();
                if(String(data.pin) === String(pin)) {
                    currentUserId = id;
                    database.ref('clients/' + id).on('value', function(realtimeSnap) {
                        const updatedData = realtimeSnap.val();
                        currentUserSolde = updatedData.solde || 0;
                        document.getElementById('logged-out-zone').style.display = 'none';
                        document.getElementById('logged-in-zone').style.display = 'block';
                        document.getElementById('user-name').innerText = updatedData.nom;
                        document.getElementById('user-balance').innerText = currentUserSolde.toLocaleString('fr-FR');
                    });
                    
                    // Épargne Historique
                    database.ref('commandes_epargne').orderByChild('client_id').equalTo(currentUserId).on('value', function(snapHist) {
                        const histBox = document.getElementById('epargne-historique');
                        if(snapHist.exists()) {
                            histBox.innerHTML = "";
                            snapHist.forEach(function(child) {
                                const val = child.val();
                                histBox.innerHTML += `• ${val.montant}F (${val.compteur}) - ${val.date}<br>`;
                            });
                        }
                    });
                } else { alert("Code PIN incorrect"); }
            } else { alert("Aucun compte associé à ce numéro"); }
        }).catch(function(err) { alert("Erreur serveur : " + err.message); });
    }

    // Inscription
    function executerInscription() {
        const name = document.getElementById('reg-name').value.trim();
        const id = document.getElementById('reg-id').value.trim();
        const pin = document.getElementById('reg-pin').value.trim();
        if(!name || !id || !pin) { alert("Veuillez remplir tous les champs"); return; }
        
        database.ref('clients/' + id).set({ nom: name, pin: pin, solde: 0 }).then(function() {
            alert("Compte créé avec succès ! Connectez-vous.");
            document.getElementById('register-interface').style.display = 'none';
            document.getElementById('login-interface').style.display = 'block';
            document.getElementById('login-id').value = id;
        }).catch(function(e) { alert("Erreur d'enregistrement : " + e.message); });
    }

    // Déconnexion
    function executerDeconnexion() {
        if(currentUserId) { database.ref('clients/' + currentUserId).off(); }
        currentUserId = null;
        document.getElementById('logged-in-zone').style.display = 'none';
        document.getElementById('logged-out-zone').style.display = 'block';
    }

    // Achat Marketplace
    function acheterProduit(nomProduit, prix, qteId, waId) {
        const qte = Number(document.getElementById(qteId).value);
        const whatsapp = document.getElementById(waId).value.trim();
        if(!whatsapp || qte < 1) { alert("Format invalide."); return; }
        const total = prix * qte;
        if(currentUserSolde < total) { alert("Solde insuffisant."); return; }

        database.ref('clients/' + currentUserId).update({ solde: currentUserSolde - total }).then(function() {
            database.ref('commandes_marketplace').push().set({
                client_id: currentUserId, produit: nomProduit, quantite: qte, montant_total: total, whatsapp: whatsapp, date: new Date().toLocaleString('fr-FR')
            }).then(function() { alert("Commande enregistrée !"); });
        });
    }

    // Demande de Retrait Portefeuille Principal
    function validerRetrait() {
        const montant = Number(document.getElementById('retrait-montant').value);
        const numero = document.getElementById('retrait-numero').value.trim();
        const reseau = document.getElementById('retrait-reseau').value;
        const statusBox = document.getElementById('retrait-status');

        if(!montant || montant <= 0 || !numero) { alert("Données invalides"); return; }
        if(currentUserSolde < montant) { alert("Solde insuffisant"); return; }

        database.ref('clients/' + currentUserId).update({ solde: currentUserSolde - montant }).then(function() {
            database.ref('commandes_retraits').push().set({
                client_id: currentUserId, montant: montant, numero: numero, reseau: reseau, date: new Date().toLocaleString('fr-FR'), statut: "En attente"
            }).then(function() {
                statusBox.style.color = "#00ff00"; statusBox.innerText = "Retrait en cours de traitement."; statusBox.style.display = "block";
            });
        });
    }

    // 1XBET Dépôt
    function recharger1XBet() {
        const idJoueur = document.getElementById('xbet-id-joueur').value.trim();
        const montant = Number(document.getElementById('xbet-montant').value);
        const whatsapp = document.getElementById('xbet-whatsapp').value.trim();
        const statusBox = document.getElementById('xbet-status');

        if(!idJoueur || !montant || montant < 100 || !whatsapp) { alert("Champs invalides."); return; }
        if(currentUserSolde < montant) { alert("Solde insuffisant"); return; }

        database.ref('clients/' + currentUserId).update({ solde: currentUserSolde - montant }).then(function() {
            database.ref('commandes_1xbet').push().set({
                client_id: currentUserId, type_operation: "Dépôt", id_joueur_1xbet: idJoueur, montant: montant, whatsapp_rechargeur: whatsapp, date: new Date().toLocaleString('fr-FR'), statut: "En attente"
            }).then(function() {
                statusBox.style.color = "#00ff00"; statusBox.innerText = "Demande de dépôt 1XBET validée."; statusBox.style.display = "block";
            });
        });
    }

    // 1XBET Retrait
    function retrait1XBet() {
        const idJoueur = document.getElementById('xbet-retrait-id').value.trim();
        const montant = Number(document.getElementById('xbet-retrait-montant').value);
        const whatsapp = document.getElementById('xbet-retrait-whatsapp').value.trim();
        const statusBox = document.getElementById('xbet-status');

        if(!idJoueur || !montant || montant <= 0 || !whatsapp) { alert("Veuillez remplir correctement les champs de retrait."); return; }
        
        database.ref('commandes_1xbet').push().set({
            client_id: currentUserId, type_operation: "Retrait", id_joueur_1xbet: idJoueur, montant: montant, whatsapp_rechargeur: whatsapp, date: new Date().toLocaleString('fr-FR'), statut: "En attente"
        }).then(function() {
            statusBox.style.color = "#ffeb3b"; statusBox.innerText = "Demande de retrait 1XBET soumise ! Nous vous contacterons."; statusBox.style.display = "block";
        });
    }

    // Factures
    function payerFacture() {
        const type = document.getElementById('facture-type').value;
        const idCompte = document.getElementById('facture-id').value.trim();
        const montant = Number(document.getElementById('facture-montant').value);
        const whatsapp = document.getElementById('facture-whatsapp').value.trim();
        const statusBox = document.getElementById('facture-status');

        if(!idCompte || !montant || !whatsapp) { alert("Champs obligatoires."); return; }
        if(currentUserSolde < montant) { alert("Solde insuffisant"); return; }

        database.ref('clients/' + currentUserId).update({ solde: currentUserSolde - montant }).then(function() {
            database.ref('commandes_factures').push().set({
                client_id: currentUserId, type_facture: type, id_compte: idCompte, montant: montant, whatsapp_rechargeur: whatsapp, date: new Date().toLocaleString('fr-FR'), statut: "En attente"
            }).then(function() {
                statusBox.style.color = "#00ff00"; statusBox.innerText = "Paiement envoyé avec succès."; statusBox.style.display = "block";
            });
        });
    }

    // Forfaits
    function acheterForfait() {
        const reseau = document.getElementById('forfait-reseau').value;
        const motif = document.getElementById('forfait-motif').value;
        const montant = Number(document.getElementById('forfait-offre').value);
        const numero = document.getElementById('forfait-numero').value.trim();
        const statusBox = document.getElementById('forfait-status');

        if(!montant || !numero) { alert("Données manquantes."); return; }
        if(currentUserSolde < montant) { alert("Solde insuffisant"); return; }

        database.ref('clients/' + currentUserId).update({ solde: currentUserSolde - montant }).then(function() {
            database.ref('commandes_forfaits').push().set({
                client_id: currentUserId, reseau: reseau, motif: motif, montant: montant, numero_beneficiaire: numero, date: new Date().toLocaleString('fr-FR'), statut: "En attente"
            }).then(function() {
                statusBox.style.color = "#00ff00"; statusBox.innerText = "Traitement du forfait en cours."; statusBox.style.display = "block";
            });
        });
    }

    // Immobilier
    function solliciterImmo() {
        const ville = document.getElementById('immo-ville').value;
        const whatsapp = document.getElementById('immo-whatsapp').value.trim();
        const montant = Number(document.getElementById('immo-montant').value);
        const statusBox = document.getElementById('immo-status');

        if(!whatsapp || !montant) { alert("Veuillez remplir les champs."); return; }
        if(currentUserSolde < montant) { alert("Solde insuffisant."); return; }

        database.ref('clients/' + currentUserId).update({ solde: currentUserSolde - montant }).then(function() {
            database.ref('commandes_immobilier').push().set({
                client_id: currentUserId, ville: ville, whatsapp: whatsapp, montant_visite: montant, date: new Date().toLocaleString('fr-FR')
            }).then(function() {
                statusBox.style.color = "#00ff00"; statusBox.innerText = "Demande de visite enregistrée !"; statusBox.style.display = "block";
            });
        });
    }

    // Épargne
    function placerEpargne() {
        const compteur = document.getElementById('epargne-compteur').value;
        const montant = Number(document.getElementById('epargne-montant').value);
        const whatsapp = document.getElementById('epargne-whatsapp').value.trim();
        const statusBox = document.getElementById('epargne-status');

        if(!montant || !whatsapp) { alert("Complétez le formulaire."); return; }
        if(currentUserSolde < montant) { alert("Solde insuffisant"); return; }

        database.ref('clients/' + currentUserId).update({ solde: currentUserSolde - montant }).then(function() {
            database.ref('commandes_epargne').push().set({
                client_id: currentUserId, compteur: compteur, montant: montant, whatsapp: whatsapp, date: new Date().toLocaleString('fr-FR')
            }).then(function() {
                statusBox.style.color = "#00ff00"; statusBox.innerText = "Épargne enregistrée."; statusBox.style.display = "block";
            });
        });
    }

    // Livraison
    function demanderLivraison() {
        const ville = document.getElementById('livraison-ville').value;
        const whatsapp = document.getElementById('livraison-whatsapp').value.trim();
        const montant = Number(document.getElementById('livraison-montant').value);
        const statusBox = document.getElementById('livraison-status');

        if(!whatsapp || montant < 500) { alert("Minimum 500F."); return; }
        if(currentUserSolde < montant) { alert("Solde insuffisant"); return; }

        database.ref('clients/' + currentUserId).update({ solde: currentUserSolde - montant }).then(function() {
            database.ref('commandes_livraison').push().set({
                client_id: currentUserId, ville: ville, whatsapp: whatsapp, montant: montant, date: new Date().toLocaleString('fr-FR')
            }).then(function() {
                statusBox.style.color = "#00ff00"; statusBox.innerText = "Livreur notifié !"; statusBox.style.display = "block";
            });
        });
    }

    // Échanges Devises
    function executerEchange() {
        const donne = document.getElementById('echange-donne').value;
        const recoit = document.getElementById('echange-recoit').value;
        const montant = Number(document.getElementById('echange-montant').value);
        const adresse = document.getElementById('echange-adresse').value.trim();
        const whatsapp = document.getElementById('echange-whatsapp').value.trim();
        const statusBox = document.getElementById('echange-status');

        if(!montant || !adresse || !whatsapp) { alert("Champs requis vides."); return; }
        
        database.ref('commandes_echanges').push().set({
            client_id: currentUserId, donne: donne, recoit: recoit, montant: montant, adresse: adresse, whatsapp: whatsapp, date: new Date().toLocaleString('fr-FR'), statut: "En attente"
        }).then(function() {
            statusBox.style.color = "#00ff00"; statusBox.innerText = "Échange en attente de validation."; statusBox.style.display = "block";
        });
    }

    // P2P / P2M
    function executerP2P() {
        const donneur = document.getElementById('p2p-donneur').value;
        const receveur = document.getElementById('p2p-receveur').value;
        const numero = document.getElementById('p2p-numero').value.trim();
        const montant = Number(document.getElementById('p2p-montant').value);
        const statusBox = document.getElementById('p2p-status');

        if(!numero || !montant || montant <= 0) { alert("Veuillez saisir un numéro valide et un montant."); return; }
        if(currentUserSolde < montant) { alert("Solde de compte insuffisant."); return; }

        database.ref('clients/' + currentUserId).update({ solde: currentUserSolde - montant }).then(function() {
            database.ref('commandes_p2p_p2m').push().set({
                client_id: currentUserId, reseau_donneur: donneur, reseau_receveur: receveur, numero_receveur: numero, montant: montant, date: new Date().toLocaleString('fr-FR'), statut: "En attente"
            }).then(function() {
                statusBox.style.color = "#00ff00"; statusBox.innerText = "Transaction P2P/P2M enregistrée en attente."; statusBox.style.display = "block";
            });
        });
    }
</script>
</body>
</html>
