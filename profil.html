<h1 style="text-align:left;font-size:26px">Vérification d'identité</h1>
<p style="text-align:left">Vérifiez que vos informations d'identités correspondent à votre pièce d'identité.</p>
<label class="label">Nom <span>*</span></label><input id="nom" class="input" placeholder="Ayizan">
<label class="label">Prénom <span>*</span></label><input id="prenom" class="input" placeholder="Marius">
<label class="label">Date de naissance <span>*</span></label><input id="dob" type="date" class="input" value="2000-01-18">
<label class="label">Genre <span>*</span></label><select id="genre" class="input"><option>Masculin</option><option>Féminin</option></select>
<label class="label">Pays <span>*</span></label><select id="pays" class="input"><option>Benin</option><option>Togo</option><option>Nigeria</option><option>Côte d'Ivoire</option></select>
<button class="btn" onclick="">METTRE À JOUR</button>
</div>
