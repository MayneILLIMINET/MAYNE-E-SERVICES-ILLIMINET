<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Infos Compte - MAYNE</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {apiKey:"AIzaSyDR0zDiGxisp4G-CDjltu8VFmxMMFjXI9E",authDomain:"mayneilliminetdb.firebaseapp.com",databaseURL:"https://mayneilliminetdb-default-rtdb.firebaseio.com",projectId:"mayneilliminetdb",storageBucket:"mayneilliminetdb.appspot.com",messagingSenderId:"904857888891",appId:"1:904857888891:web:a89e339ea89de0340a5ade"};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const database = firebase.database();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#fcb;display:flex;justify-content:center}
.app{max-width:430px;width:100%;min-height:100vh;background:#aaaa;padding-bottom:90px}
.head{padding:16px;color:#fff;display:flex;align-items:center;gap:12px;position:sticky;top:0;background:#500;z-index:2}
.back{width:44px;height:44px;background:#aaa;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer}
.card{margin:10px 16px;background:#000;border-radius:20px;padding:18px;box-shadow:0 4px 14px rgba(0,0,0,.06)}
.label{font-size:11px;font-weight:800;color:#aaa;margin-top:14px;display:block;text-transform:uppercase}
.input,.select{width:100%;color:#fff;padding:14px;border:1px solid #fff;border-radius:14px;margin-top:6px;font-size:14px;background:#aaaa}
.badge{display:inline-flex;padding:6px 12px;border-radius:100px;font-size:12px;font-weight:700;margin-top:6px}
.badge.ok{background:#e8f5e9;color:#2e7d32}
.badge.wait{background:#fff8e1;color:#f57f17}
.badge.no{background:#fdecea;color:#c0392b}
.btn{width:100%;background:#ff5000;color:#fff;border:none;border-radius:100px;padding:16px;font-weight:800;margin-top:24px;cursor:pointer}
.notif{position:fixed;top:15px;left:50%;transform:translateX(-50%);background:#ff5000;color:#fff;padding:12px 18px;border-radius:10px;display:none;z-index:999}
</style>
</head>
<body>
<div class="app">
<div class="head"><div class="back" onclick="location.href='compte.html'">🔙</div><b>Information sur le compte</b></div>
<div class="card">
<label class="label">Nom</label><input id="nom" class="input">
<label class="label">Prénom</label><input id="prenom" class="input">
<label class="label">Numéro WhatsApp</label><input id="phone" class="input">
<label class="label">Email</label><input id="email" class="input">
<label class="label">Sexe</label>
<select id="sexe" class="select"><option value="">Choisir</option><option value="Homme">Homme</option><option value="Femme">Femme</option></select>
<label class="label">Numéro Carte d'Identité / CIP</label><input id="cni" class="input">
<label class="label">Statut du compte</label><div id="statut"></div>
<button class="btn" onclick="saveInfos()">Enregistrer</button>
</div>
</div>
<div class="notif" id="notif"></div>
<script>
function showN(t){const e=document.getElementById('notif');e.textContent=t;e.style.display='block';setTimeout(()=>e.style.display='none',3000);}
let currentUser = JSON.parse(localStorage.getItem('mayne_current_user')||'{}');
const phoneKey = (currentUser.phone||'').replace(/[^0-9]/g,'') || 'user_'+Date.now();

function load(){
  // Charge depuis Firebase si dispo
  if(currentUser.phone){
    database.ref('users/'+phoneKey).once('value').then(snap=>{
      if(snap.exists()){
        const fb = snap.val();
        currentUser = {...currentUser, ...fb};
        localStorage.setItem('mayne_current_user', JSON.stringify(currentUser));
        fill();
      } else { fill(); }
    });
  } else { fill(); }
}
function fill(){
  document.getElementById('nom').value = currentUser.nom || '';
  document.getElementById('prenom').value = currentUser.prenom || '';
  document.getElementById('phone').value = currentUser.phone || '';
  document.getElementById('email').value = currentUser.email || '';
  document.getElementById('sexe').value = currentUser.sexe || '';
  document.getElementById('cni').value = currentUser.cni || '';
  const isVerif = currentUser.verifie === true;
  const hasCni = (currentUser.cni||'').length >= 5;
  let html = isVerif ? '<span class="badge ok">✅ Vérifié</span>' : hasCni ? '<span class="badge wait">⏳ En attente</span>' : '<span class="badge no">❌ Non vérifié</span>';
  document.getElementById('statut').innerHTML = html;
}
function saveInfos(){
  currentUser.nom = document.getElementById('nom').value.trim();
  currentUser.prenom = document.getElementById('prenom').value.trim();
  currentUser.phone = document.getElementById('phone').value.trim();
  currentUser.email = document.getElementById('email').value.trim();
  currentUser.sexe = document.getElementById('sexe').value;
  currentUser.cni = document.getElementById('cni').value.trim();
  if(currentUser.cni && currentUser.verifie !== true) currentUser.verifie = false;

  localStorage.setItem('mayne_current_user', JSON.stringify(currentUser));
  const key = (currentUser.phone||phoneKey).replace(/[^0-9]/g,'');
  database.ref('users/'+key).update({
    nom: currentUser.nom,
    prenom: currentUser.prenom,
    phone: currentUser.phone,
    email: currentUser.email,
    sexe: currentUser.sexe,
    cni: currentUser.cni,
    verifie: currentUser.verifie || false,
    date_update: new Date().toLocaleString('fr-FR')
  }).then(()=>{ showN('✅ Enregistré et envoyé pour vérif'); fill(); });
}
window.onload=load;
</script>
</body>
</html>
