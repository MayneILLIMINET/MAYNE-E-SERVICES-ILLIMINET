<!DOCTYPE html>
<html lang="fr"><head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mises à jour</title>
<style>body{font-family:Arial;background:#f5f5f5;padding:16px}.card{background:#fff;padding:16px;border-radius:12px}.dl-label{display:inline-block;background:#0011ff;color:#fff;padding:14px 22px;border-radius:10px;font-weight:bold;cursor:pointer}.dl-label:active{opacity:0.7}</style>
</head><body>
<h2>Mettre à jour maintenant</h2>
<div class="card">
<h3><span style="background:red;color:#fff;padding:2px 8px;border-radius:10px;font-size:25px">Nouvelle v1</span></h3>
<p>Ajout Conditions + correction liens</p>

<span class="dl-label" id="btnDL">📥 TÉLÉCHARGER</span>
</div>

<a id="retour" href="index.html">← Retour</a>

<script>
const APK_URL = 'https://github.com/MayneILLIMINET/MAYNE-E-SERVICES-ILLIMINET/releases/download/v3.0/MayneILLIMINET_V3.apk';


document.getElementById('btnDL').addEventListener('click', function(){
  if(window.AppInventor){
    window.AppInventor.setWebViewString(APK_URL);
  } else {
    window.location.href = APK_URL;
  }
});

// Retour anti-cache
document.getElementById('retour').addEventListener('click', function(e){
  e.preventDefault();
  window.location.href = 'index.html?nocache=' + Date.now();
});
</script>
</body></html>
