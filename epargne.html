<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Epargne MAYNE</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#ff5000;display:flex;justify-content:center}
.app{max-width:430px;width:100%;padding-bottom:90px;background:#aaa;min-height:100vh}
.top{display:flex;justify-content:space-between;align-items:center;padding:16px}
.avatar{width:44px;height:44px;border-radius:50%;background:#ddd;display:flex;align-items:center;justify-content:center;font-weight:800}
.card{margin:12px 16px;background:#000;border-radius:22px;padding:18px;color:#fff}
.montant{font-size:15px;font-weight:800;margin:10px 0}
.sub{font-size:20px;color:#fff;display:flex;gap:20px;margin-bottom:20px}
.btn{width:100%;background:#fdc;border:none;border-radius:100px;padding:14px;font-weight:800;color:#0f3d2e}
.pills{display:flex;gap:10px;padding:10px 16px}
.pill{flex:1;background:#fcb;border-radius:100px;padding:12px;text-align:center;font-weight:700;box-shadow:0 4px 10px rgba(0,0,0,.06);cursor:pointer}
.kyc{margin:12px 16px;background:#ff5000;border-radius:16px;padding:14px;display:flex;justify-content:space-between;align-items:center}
.list{padding:16px}
.item{background:#fff;border-radius:12px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;background:#000;display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid #eee}
.bnav{border:none;background:000;font-size:11px;color:#888;cursor:pointer}
.bnav.active{background:#000;color:#fcb;border-radius:100px;padding:8px 16px;font-weight:700}
.modal{position:fixed;inset:0;background:fcb(0,0,0,.4);display:none;align-items:flex-end;justify-content:center;z-index:20}
.modal.show{display:flex}
.sheet{background:#fff;width:100%;max-width:430px;border-radius:20px 20px 0 0;padding:18px}
.input{width:100%;padding:13px;border:1px solid #ddd;border-radius:10px;margin:6px 0}
</style>
</head>
<body>
<div class="app">
<div class="top">
<div style="display:flex;gap:10px;align-items:center"><div class="avatar" id="av">A</div><div><b id="uname">...</b><br><span id="uemail" style="font-size:11px;color:#888"></span></div></div><div><button class="bnav" onclick="location.href='notifications.html'">🔔</button></div>
</div>
<div class="card">
<div style="font-size:12px;color:#a8c0b6;display:flex;justify-content:space-between">Solde Principal<span onclick="toggleSolde()" style="cursor:pointer">👁️</span></div>
<div class="montant" id="solde">0.00 XOF</div>
<div class="sub"><div>Commission<br><b id="com">0 XOF</b></div><div>Solde_Epargne<br><b id="rec">0 XOF</b></div></div>
<button class="btn" onclick="openR()">Retirer de l'argent ↓</button>
</div>
<div class="pills"><div class="pill" onclick="openN()">＋ Nouvelle épargne</div><div class="pill" onclick="document.querySelector('.list').scrollIntoView({behavior:'smooth'})">◍ Mes épargnes</div></div>
<div class="kyc" id="kyc"><div><b>Vérification d'identité</b><br><span style="font-size:11px">Retrait après KYC validé</span></div><button style="background:#fcb;border:none;border-radius:100px;padding:8px 14px;font-weight:700" onclick="location.href='kyc.html'">Vérifier</button></div>
<div class="list"><h3>Historique d'épargne</h3><div id="histo"></div></div>
</div>
<div class="bottom"><button class="bnav" onclick="location.href='index.html'">🏠 Accueil</button><button class="bnav active">⭐ Épargne</button><button class="bnav">↕</button><button class="bnav" onclick="location.href='compte.html'">👤Compte</button></div>

<div class="modal" id="mnew"><div class="sheet"><h3>Nouvelle épargne</h3><select id="compteur" class="input"><option>Mensuel +2%</option><option>Annuel +5%</option><option>Fermé +7%</option></select><input id="montant" type="number" placeholder="Montant" class="input"><input id="wa" placeholder="WhatsApp" class="input"><button class="input" style="background:#0f3d2e;color:#fff;border-radius:100px;font-weight:800" onclick="placer()">Confirmer</button><button class="input" style="background:#eee;border-radius:100px" onclick="closeM()">Annuler</button></div></div>
<div class="modal" id="mret"><div class="sheet"><h3>Retrait</h3><input id="rmont" type="number" placeholder="Montant" class="input"><input id="rwa" placeholder="WhatsApp" class="input"><button class="input" style="background:#c0392b;color:#fff;border-radius:100px" onclick="retirer()">Demander</button><button class="input" style="background:#eee;border-radius:100px" onclick="closeM()">Annuler</button></div></div>

<script>
const cfg={apiKey:"AIzaSyDR0zDiGxisp4G-CDjltu8VFmxMMFjXI9E",authDomain:"mayneilliminetdb.firebaseapp.com",databaseURL:"https://mayneilliminetdb-default-rtdb.firebaseio.com",projectId:"mayneilliminetdb"};
if(!firebase.apps.length)firebase.initializeApp(cfg);
const db=firebase.database();
let uid, soldePrincipal=0, soldeEpargne=0, commission=0, vis=true;

function init(){
  const u=JSON.parse(localStorage.getItem('mayne_current_user')||'null');
  if(!u){location.href='index.html';return;}
  uid=(u.phone||'').replace(/[^0-9]/g,'');
  document.getElementById('wa').value=u.phone||'';
  document.getElementById('rwa').value=u.phone||'';

  // Affiche direct ce qu'on a en local
  const fullNameLocal = ((u.prenom||'')+' '+(u.nom||'')).trim() || u.nom || u.prenom || 'Client';
  document.getElementById('uname').textContent=fullNameLocal;
  document.getElementById('uemail').textContent=u.email||u.phone||'';
  document.getElementById('av').textContent=(fullNameLocal[0]||'A').toUpperCase();

  db.ref('clients/'+uid).on('value',s=>{
    const d=s.val()||{};
    soldePrincipal = +d.solde||0;
    soldeEpargne = +d.solde_epargne||0;
    commission = +d.commission||0;

    // ✅ On met à jour le nom depuis Firebase aussi (au cas où local est vide)
    const fullNameFB = ((d.prenom||'')+' '+(d.nom||'')).trim() || d.nom || d.prenom || fullNameLocal;
    if(fullNameFB && fullNameFB!== 'Client'){
      document.getElementById('uname').textContent=fullNameFB;
      document.getElementById('av').textContent=fullNameFB[0].toUpperCase();
      // on resync le local
      const updated = {...u, nom: d.nom||u.nom, prenom: d.prenom||u.prenom, email: d.email||u.email};
      localStorage.setItem('mayne_current_user', JSON.stringify(updated));
    }
    if(d.email) document.getElementById('uemail').textContent=d.email;

    document.getElementById('solde').textContent=vis?soldePrincipal.toFixed(2)+' XOF':'••••••';
    document.getElementById('rec').textContent=soldeEpargne.toFixed(2)+' XOF';
    document.getElementById('com').textContent=commission.toFixed(2)+' XOF';
    if(d.verifie) document.getElementById('kyc').style.display='none';
  });

  db.ref('epargne/'+uid).limitToLast(30).on('value',s=>{
    const c=document.getElementById('histo');
    if(!s.exists()){ c.innerHTML='<div style="background:#fff;border-radius:16px;padding:24px;text-align:center">Aucun historique pour le moment</div>'; return;}
    let h=''; s.forEach(ch=>{const v=ch.val(); const neg=v.montant<0; h=`<div class=item><div><b>${v.type} ${v.compteur||''}</b><br><small>${v.date}${v.bonus?` • Bonus ${v.bonus}`:''}</small></div><b style="color:${neg?'#c0392b':'#0f3d2e'}">${v.montant} XOF</b></div>`+h;});
    c.innerHTML=h;
  });
}
function toggleSolde(){vis=!vis; document.getElementById('solde').textContent=vis?soldePrincipal.toFixed(2)+' XOF':'••••••';}
function openN(){document.getElementById('mnew').classList.add('show')}
function openR(){document.getElementById('mret').classList.add('show')}
function closeM(){document.querySelectorAll('.modal').forEach(m=>m.classList.remove('show'))}
function placer(){
  const cp=compteur.value, mt=Number(montant.value), wa=document.getElementById('wa').value.trim();
  if(!mt) return alert('Montant');
  if(mt>soldePrincipal) return alert('Solde principal insuffisant: '+soldePrincipal+' XOF');
  const bonus=Math.round(mt*(cp.includes('Mensuel')?0.02:cp.includes('Annuel')?0.05:0.07));
  db.ref('clients/'+uid).once('value').then(s=>{
    const c=s.val()||{};
    return db.ref('clients/'+uid).update({solde:(+c.solde||0)-mt, solde_epargne:(+c.solde_epargne||0)+mt, commission:(+c.commission||0)+bonus});
  }).then(()=>db.ref('epargne/'+uid).push().set({type:'Placement',compteur:cp,montant:mt,bonus:bonus,whatsapp:wa,date:new Date().toLocaleString('fr-FR'),statut:'actif'}))
 .then(()=>{alert('Placé '+mt+' + bonus '+bonus); closeM(); montant.value='';});
}
function retirer(){
  const mt=Number(rmont.value), wa=rwa.value.trim();
  if(!mt) return alert('Montant');
  if(mt>soldeEpargne) return alert('Epargne insuffisante: '+soldeEpargne);
  db.ref('clients/'+uid).once('value').then(s=>{
    const c=s.val()||{};
    return db.ref('clients/'+uid).update({solde:(+c.solde||0)+mt, solde_epargne:(+c.solde_epargne||0)-mt});
  }).then(()=>db.ref('epargne/'+uid).push().set({type:'Retrait Epargne',montant:-mt,whatsapp:wa,date:new Date().toLocaleString('fr-FR'),statut:'en cours'}))
 .then(()=>{alert('Retrait envoyé vers solde principal'); closeM();});
}
window.onload=init;
</script>
</body>
</html>
