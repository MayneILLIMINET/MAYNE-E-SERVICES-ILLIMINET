<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Market - MAYNE</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyDR0zDiGxisp4G-CDjltu8VFmxMMFjXI9E",authDomain:"mayneilliminetdb.firebaseapp.com",databaseURL:"https://mayneilliminetdb-default-rtdb.firebaseio.com",projectId:"mayneilliminetdb"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
const database=firebase.database(); const db=database;
const ONESIGNAL_WEBHOOK='https://script.google.com/macros/s/AKfycbzoM5bqwSZm83RtFHaJK58ByQCqByYc2hCk58GA-97h0FTsC4cqca12cj38w0tf7jxv/exec';
</script>
<style>
*{box-sizing:border-box}html,body{margin:0;height:100dvh;overflow:hidden}body{background:#111;display:flex;justify-content:center;font-family:Arial}
.app-container{width:100%;max-width:430px;height:100dvh;background:#4a0000;border:2px solid #fff;border-radius:10px;display:flex;flex-direction:column;overflow:hidden}
.user-header{flex-shrink:0;background:#4a0000;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #fff}
.btn-logout{background:#500;color:#fff;border:2px solid #aaa;padding:6px 12px;border-radius:20px;font-size:10px;font-weight:bold}
.publish-zone{flex-shrink:0;background:#1e1e1e;padding:10px;border-bottom:2px solid #333}
.input-field{width:100%;padding:10px;border-radius:8px;border:2px solid #fff;background:#2a3942;color:#fff;font-size:13px}
.btn-pick{display:block;background:#6d4c41;color:#fff;padding:10px;border-radius:8px;text-align:center;font-weight:bold;margin:8px 0;cursor:pointer;border:1px solid #fff}
.btn-submit{width:100%;background:#ff5000;color:#fff;border:none;padding:11px;font-size:14px;font-weight:bold;border-radius:8px;cursor:pointer}
#market-feed{flex:1;min-height:0;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:12px;background:#3a0000}
.product-card{background:#6d4c41;border:1px solid #8d6e63;border-radius:14px;padding:10px;color:#fff;text-align:left}
.product-card img{width:100%;height:auto;min-height:120px;max-height:500px;object-fit:cover;border-radius:10px;margin:6px 0;display:block;background:#2a2a2a}
.actions{display:flex;gap:6px;margin-top:8px}
.inner-btn{flex:1;padding:8px 4px;font-size:11px;font-weight:bold;background:#4a0000;color:#fff;border:1px solid #fff;border-radius:8px;cursor:pointer}
.inner-btn.like-active{background:#ff0040!important}
.comments{margin-top:8px;font-size:11px;color:#ddd;background:rgba(0,0,0,.3);padding:6px;border-radius:8px}
.likers{font-size:11px;color:#ffcc80;margin-top:4px;cursor:pointer}
.bottom-bar{flex-shrink:0;height:60px;background:#202c33;display:flex;align-items:center;justify-content:space-around;padding:0 10px;border-top:2px solid #fff}
.bottom-bar button{background:#500;color:#fff;border:1px solid #fff;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:bold}
#img-viewer{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:99999}
#img-viewer img{max-width:96%;max-height:96%;border-radius:10px}
/* MASQUE CUSTOM SANS URL */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:99999;padding:15px;box-sizing:border-box}
.modal-box{background:#1e1e1e;color:#fff;padding:20px;border-radius:12px;max-width:320px;width:100%;text-align:center;border:2px solid #fff}
.modal-msg{font-size:15px;margin-bottom:14px}
.modal-btns{display:flex;gap:8px;margin-top:10px}
.modal-btn{flex:1;padding:10px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.btn-yes{background:#ff5000;color:#fff}
.btn-no{background:#ddd;color:#000}
</style>
</head>
<body>
<div class="app-container">
<div class="user-header"><div id="user-name" style="font-weight:bold;color:#fff">CHARGEMENT...</div><button class="btn-logout" onclick="location.href='index.html'">ACCUEIL</button></div>
<div class="publish-zone"><textarea id="post-texte" class="input-field" rows="2" placeholder="Propose un produit..."></textarea><label onclick="pickImage()" class="btn-pick">📷 Choisir photo</label><div id="img-name" style="font-size:11px;color:#aaa;text-align:center">Aucune image</div><button class="btn-submit" onclick="publierPost()">Publier</button></div>
<div id="market-feed"></div>
<div class="bottom-bar"><button onclick="location.href='messagerie.html'">💬 Messagerie</button><button onclick="document.getElementById('market-feed').scrollTop=0">⬆️ Haut</button></div>
</div>
<div id="img-viewer" onclick="this.style.display='none'"><img id="img-viewer-pic"></div>

<!-- MASQUE CUSTOM -->
<div id="custom-prompt" class="modal-overlay"><div class="modal-box"><div id="custom-prompt-msg" class="modal-msg">Ton commentaire :</div><input id="custom-prompt-input" class="input-field" style="margin:12px 0;text-align:left"><div class="modal-btns"><button class="modal-btn btn-no" onclick="hidePrompt(false)">Annuler</button><button class="modal-btn btn-yes" onclick="hidePrompt(true)">OK</button></div></div></div>
<div id="custom-alert" class="modal-overlay"><div class="modal-box"><div id="custom-alert-msg" class="modal-msg"></div><button class="modal-btn btn-yes" onclick="document.getElementById('custom-alert').style.display='none'">OK</button></div></div>

<script>
let currentUserId=null; window.currentImageUrl=null; let promptCallback=null;
function showAlert(m){ document.getElementById('custom-alert-msg').innerText=m; document.getElementById('custom-alert').style.display='flex'; }
function showInput(titre,cb){ promptCallback=cb; document.getElementById('custom-prompt-msg').innerText=titre; document.getElementById('custom-prompt-input').value=''; document.getElementById('custom-prompt').style.display='flex'; setTimeout(()=>document.getElementById('custom-prompt-input').focus(),100); }
function hidePrompt(ok){ document.getElementById('custom-prompt').style.display='none'; if(ok&&promptCallback){ promptCallback(document.getElementById('custom-prompt-input').value.trim()); } }

function pickImage(){ if(window.AppInventor) window.AppInventor.setWebViewString('PICK_IMAGE'); else { let i=document.createElement('input'); i.type='file'; i.accept='image/*'; i.onchange=e=>{ let f=e.target.files[0]; let r=new FileReader(); r.onload=ev=>{ uploadToCloudinary(ev.target.result).then(u=>{ window.currentImageUrl=u; document.getElementById('img-name').innerText='Image prête ✓'; }); }; r.readAsDataURL(f); }; i.click(); } }
async function uploadToCloudinary(b64){ const fd=new FormData(); fd.append('file',b64); fd.append('upload_preset','mayneaudio'); const res=await fetch("https://api.cloudinary.com/v1_1/dkzpkvidk/auto/upload",{method:'POST',body:fd}); const j=await res.json(); return j.secure_url; }
setInterval(()=>{ if(!window.AppInventor) return; let d=window.AppInventor.getWebViewString(); if(d&&d.startsWith('https://')){ document.getElementById('img-name').innerText='Image prête ✓ Clique Publier'; window.currentImageUrl=d.trim(); window.AppInventor.setWebViewString(''); } },400);
async function pushJS(destId,titre,msg){ if(!destId||destId===currentUserId) return; try{ await fetch(ONESIGNAL_WEBHOOK,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({destId,titre,message:msg})}); }catch(e){} }
async function publierPost(){ const t=document.getElementById('post-texte').value.trim(); if(!t&&!window.currentImageUrl) return showAlert('Ajoute texte ou photo'); const p={authorId:currentUserId,authorNom:document.getElementById('user-name').innerText,texte:t,image:window.currentImageUrl||null,createdAt:Date.now()}; await database.ref('posts').push().set(p); document.getElementById('post-texte').value=''; window.currentImageUrl=null; document.getElementById('img-name').innerText='Aucune image'; }
function getThumb(url,w){ if(!url) return ''; if(url.includes('/upload/')) return url.replace('/upload/','/upload/w_'+w+',q_auto,f_auto/'); return url; }
function chargerFeed(){ const feed=document.getElementById('market-feed'); const ref=database.ref('posts').orderByChild('createdAt').limitToLast(40); ref.off(); ref.on('child_added',snap=>{ const p=snap.val(); const id=snap.key; if(document.getElementById('post-'+id)) return; const date=new Date(p.createdAt).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); const safeNom=(p.authorNom||'').replace(/'/g,"\\'"); const thumb = p.image? getThumb(p.image,800) : ''; const big = p.image? getThumb(p.image,1000) : ''; const img = p.image? `<img src="${thumb}" loading="lazy" onerror="this.src='${p.image}'" onclick="document.getElementById('img-viewer-pic').src='${big}';document.getElementById('img-viewer').style.display='flex'" alt="produit">` : ''; const div=document.createElement('div'); div.id='post-'+id; div.className='product-card'; div.innerHTML=`<div style="font-size:12px;color:#ffcc80;font-weight:bold;display:flex;justify-content:space-between"><span>👤 ${p.authorNom}</span><span style="opacity:.7">${date}</span></div><div style="font-size:14px;white-space:pre-wrap;margin:6px 0">${(p.texte||'').replace(/</g,'&lt;')}</div>${img}<div class="actions"><button class="inner-btn" id="btn-like-${id}" onclick="toggleLike('${id}')">❤️ <span id="like-${id}">0</span></button><button class="inner-btn" onclick="commenterPost('${id}')">💬 Commenter</button><button class="inner-btn" onclick="ouvrirChat('${p.authorId}','${safeNom}')">✉️ Message</button></div><div id="comments-${id}" class="comments" style="display:none"></div><div id="likers-${id}" class="likers"></div>`; feed.prepend(div); chargerComments(id); listenLikes(id); }); }
// MASQUE SANS URL
function commenterPost(postId){ showInput('Ton commentaire :', function(txt){ if(!txt) return; database.ref(`comments/${postId}`).push().set({authorId:currentUserId,authorNom:document.getElementById('user-name').innerText,texte:txt,createdAt:Date.now()}).then(()=>{ database.ref(`posts/${postId}`).once('value').then(s=>{ const pd=s.val(); if(pd&&pd.authorId!==currentUserId) pushJS(pd.authorId,'💬 Commentaire',`${document.getElementById('user-name').innerText} : ${txt}`); }); }); }); }
function chargerComments(postId){ database.ref(`comments/${postId}`).limitToLast(5).on('value',s=>{ const el=document.getElementById(`comments-${postId}`); if(!el) return; let h=''; s.forEach(c=>{ const v=c.val(); h+=`• <b>${v.authorNom}</b>: ${v.texte}<br>`; }); if(h){ el.innerHTML=h; el.style.display='block'; } else el.style.display='none'; }); }
function toggleLike(postId){ const ref=db.ref('likes/'+postId+'/'+currentUserId); ref.get().then(s=>{ if(s.exists()) ref.remove(); else { ref.set({nom:document.getElementById('user-name').innerText,at:Date.now()}); database.ref(`posts/${postId}`).once('value').then(p=>{ const d=p.val(); if(d&&d.authorId!==currentUserId) pushJS(d.authorId,'❤️ J\'aime',`${document.getElementById('user-name').innerText} a aimé ta publication`); }); } }); }
function listenLikes(postId){ db.ref('likes/'+postId).on('value',snap=>{ const c=snap.numChildren(); const ce=document.getElementById('like-'+postId); const btn=document.getElementById('btn-like-'+postId); const likers=document.getElementById('likers-'+postId); if(ce) ce.innerText=c; if(btn) btn.classList.toggle('like-active', snap.hasChild(currentUserId)); if(likers){ if(c===0){ likers.innerText=''; } else { let noms=[]; snap.forEach(ch=>{ const v=ch.val(); if(v&&v.nom) noms.push(v.nom); }); likers.innerText=`❤️ ${c} j'aime · ${noms.slice(0,2).join(', ')}${c>2?' +'+(c-2):''}`; likers.onclick=()=>showAlert(noms.join('\n')); } } }); }
function ouvrirChat(dId,dNom){ if(dId===currentUserId) return showAlert("C'est toi :)"); showInput('Message à '+dNom+' :', function(txt){ if(!txt) return; const cId=[currentUserId,dId].sort().join('_'); database.ref(`conversations/${cId}/messages`).push().set({senderId:currentUserId,senderNom:document.getElementById('user-name').innerText,type:'text',texte:txt,createdAt:Date.now()}).then(()=>location.href='messagerie.html'); }); }
function init(){ let s=JSON.parse(localStorage.getItem('mayne_current_user')||'null'); if(!s){ location.href='index.html'; return; } currentUserId=s.phone.replace(/[^0-9]/g,''); database.ref('clients/'+currentUserId).once('value').then(v=>{ document.getElementById('user-name').innerText=v.val()?.nom||currentUserId; }); chargerFeed(); }
window.onload=init;
</script>
</body>
</html>
