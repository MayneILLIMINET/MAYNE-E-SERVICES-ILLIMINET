<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Echange - MAYNE</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>const firebaseConfig={apiKey:"AIzaSyDR0zDiGxisp4G-CDjltu8VFmxMMFjXI9E",authDomain:"mayneilliminetdb.firebaseapp.com",databaseURL:"https://mayneilliminetdb-default-rtdb.firebaseio.com",projectId:"mayneilliminetdb"};if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);const database=firebase.database();</script>
<style>
body{margin:0;padding:5px;font-family:Arial;background:#aaaa;display:flex;justify-content:center}
.app-container{width:100%;max-width:430px;background:#1e1e1e;border:2px solid #fff;border-radius:10px;color:#fff;padding:12px}
.input-field,.select-field{width:100%;padding:8px;border-radius:4px;border:5px solid #ff5000;background:#aaaa;color:#fff;text-align:center;font-weight:bold;margin-bottom:8px}
.dark-field{background:#1e1e1e!important;border:2px solid #fff!important}
.btn-submit{width:100%;background:#c00;color:#fff;border:5px solid #aaaa;padding:10px;font-weight:bold;border-radius:4px;margin-top:5px}
.user-header{background:#aaaa;padding:8px;border-radius:6px;border:20px solid #aaaa;margin-bottom:10px;position:relative;text-align:left}
.history-box{background:#1e1e1e;color:#fff;font-family:monospace;padding:6px;border-radius:4px;max-height:140px;overflow-y:auto;font-size:10px;margin-top:5px}
.prefix-box{display:flex;align-items:center;gap:0;margin-bottom:8px}
.prefix{padding:8px 10px;background:#1e1e1e;color:#ffeb3b;font-weight:bold;border:2px solid #fff;border-right:none;border-radius:4px 0 0 4px;min-width:60px;text-align:center}
.input-with-prefix{border-radius:0 4px 4px 0!important;flex:1}
.status-msg{display:none;font-size:12px;font-weight:bold;margin-top:8px;text-align:center;color:#006400}
.nb-box{background:#1e1e1e;color:#ffeb3b;padding:10px;border-radius:8px;font-size:11px;line-height:1.4;margin-top:10px;text-align:left;border-left:4px solid #ff5000}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:9998;padding:15px}
.modal-box{background:#500;color:#fff;padding:20px;border-radius:10px;max-width:300px;width:100%;text-align:center}
.modal-msg{font-size:15px;margin-bottom:18px}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:10px;border:none;border-radius:6px;font-weight:bold;cursor:pointer}
.btn-yes{background:#2b8a3e;color:#fff}
.btn-no{background:#ddd;color:#000}
</style>
</head><body><div class="app-container">
<div id="global-notif" style="display:none;position:fixed;top:15px;left:50%;transform:translateX(-50%);z-index:99999;background:#008000;color:#fff;padding:12px 18px;font-weight:bold;text-align:center;border-radius:8px;"></div>
<div class="user-header"><button style="position:absolute;top:1px;right:8px;background:#500;color:#fff;border:4px solid #aaa;padding:5px 10px;font-size:8px;border-radius:10px" onclick="location.href='index.html'">← ACCUEIL</button><div id="user-name">CHARGEMENT...</div><div>SOLDE: <span id="user-balance">0</span> F</div></div>

<div style="background:#aaaa;padding:10px;border-radius:6px">
<h4 style="border-bottom:2px solid #fff;padding-bottom:5px">ECHANGE PRO</h4>

<!-- 1. PAYS -->
<label>1. Pays :</label>
<select id="echange-pays" class="select-field dark-field" onchange="updateIndicatif()">
<option value="229" data-pays="🇧🇯 BÉNIN">🇧🇯 BÉNIN - 229</option>
<option value="228" data-pays="🇹🇬 TOGO">🇹🇬 TOGO - 228</option>
<option value="234" data-pays="🇳🇬 NIGÉRIA">🇳🇬 NIGÉRIA - 234</option>
<option value="233" data-pays="🇬🇭 GHANA">🇬🇭 GHANA - 233</option>
<option value="225" data-pays="🇨🇮 CÔTE D'IVOIRE">🇨🇮 CÔTE D'IVOIRE - 225</option>
<option value="223" data-pays="🇲🇱 MALI">🇲🇱 MALI - 223</option>
<option value="227" data-pays="🇳🇪 NIGER">🇳🇪 NIGER - 227</option>
</select>

<!-- 2. NUMERO RECEVEUR -->
<label>2. Numéro receveur (sans indicatif) :</label>
<div class="prefix-box"><span id="prefix-affiche" class="prefix">+229</span><input type="text" id="echange-adresse" class="input-field dark-field input-with-prefix" placeholder="Ex: 97 00 00 00"></div>

<!-- 3. MONTANT -->
<label>3. Montant :</label>
<input type="number" id="echange-montant" class="input-field dark-field" placeholder="Montant">

<!-- 4. WHATSAPP -->
<label>4. Votre WhatsApp :</label>
<input type="text" id="echange-whatsapp" class="input-field dark-field" placeholder="Votre WhatsApp">

<!-- 5. JE RECOIS -->
<label>5. Je reçois (réseau de réception) :</label>
<select id="echange-recoit" class="select-field dark-field">
<option value="MTN">MTN</option><option value="MOOV">MOOV</option><option value="CELTIS">CELTIS</option>
<option value="USDT">USDT</option><option value="BTC">BTC</option><option value="ORANGE MONEY">ORANGE MONEY</option><option value="WAVE">WAVE</option><option value="XOF">XOF</option>
</select>

<div class="nb-box">NB: Tout montant de transfert sera débité de votre <b>solde principal</b> vers le numéro receveur.</div>

<button class="btn-submit" onclick="executerEchange()">Valider Échange</button>
<p id="echange-status" class="status-msg"></p>
<div style="font-weight:bold;text-align:center;margin-top:10px">MES ÉCHANGES</div><div id="echange-historique" class="history-box">Aucun</div>
</div></div>

<div id="custom-alert" class="modal-overlay"><div class="modal-box"><div id="custom-alert-msg" class="modal-msg"></div><button class="modal-btn btn-yes" onclick="hideAlert()">OK</button></div></div>
<div id="custom-confirm" class="modal-overlay"><div class="modal-box"><div id="custom-confirm-msg" class="modal-msg"></div><div class="modal-btns"><button class="modal-btn btn-no" onclick="doConfirm(false)">Pas besoin</button><button class="modal-btn btn-yes" onclick="doConfirm(true)">Oui bien sûr</button></div></div></div>

<script>
const WEBHOOK_URL='https://script.google.com/macros/s/AKfycbwasVyjf7iuYpMoonjNy-byi-_DKBeg9VRUfrWsnXQSPJNDElCVgV67ZFiZjY-eckpH/exec';
let currentUserId=null,currentUserSolde=0,_lock=false,confirmCallback=null;
function showAlert(m){document.getElementById('custom-alert-msg').innerText=m;document.getElementById('custom-alert').style.display='flex';}
function hideAlert(){document.getElementById('custom-alert').style.display='none';}
function showConfirm(m,cb){confirmCallback=cb;document.getElementById('custom-confirm-msg').innerText=m;document.getElementById('custom-confirm').style.display='flex';}
function doConfirm(y){document.getElementById('custom-confirm').style.display='none';if(confirmCallback)confirmCallback(y);}
function envoyerAlerte(s,d){try{const p={service:s,id:Date.now(),data:Object.assign({},d,{client_id:currentUserId,client_nom:document.getElementById('user-name').innerText,telephone_compte:currentUserId})};fetch(WEBHOOK_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(p),keepalive:true});}catch(e){}}
function afficherSucces(id){const m='commande envoyée avec succès!';const t=document.getElementById('global-notif');t.innerText='👏✅ '+m;t.style.display='block';setTimeout(()=>t.style.display='none',20000);const e=document.getElementById(id);if(e){e.innerText=m;e.style.display='block';e.style.color='#006400';}}
function proposerSupport(s,d,cb){let details='';for(const[k,v]of Object.entries(d)){details+=`${k}: ${v}\n`;}const txt=`🔔 URGENT🧭\n🔈 SERVICE : ${s}\n👤 CLIENT : ${document.getElementById('user-name')?.innerText||''}\n💬 DÉTAILS:\n${details}`;showConfirm('Voulez-vous contacter le personnel sur WhatsApp pour un traitement rapide?',function(yes){if(yes)window.open('https://wa.me/2290159415617?text='+encodeURIComponent(txt),'_blank');if(cb)cb();});}
function updateIndicatif(){document.getElementById('prefix-affiche').innerText='+'+document.getElementById('echange-pays').value;}

function init(){
  let saved=JSON.parse(localStorage.getItem('mayne_current_user')||'null'); 
  if(!saved){location.href='index.html';return;}
  currentUserId=saved.phone.replace(/[^0-9]/g,'');
  updateIndicatif();
  database.ref('clients/'+currentUserId).on('value',v=>{
    const d=v.val()||{}; currentUserSolde=d.solde||0;
    document.getElementById('user-name').innerText=d.nom||currentUserId;
    document.getElementById('user-balance').innerText=(d.solde||0).toLocaleString('fr-FR');
  });
  database.ref('commandes_echanges').orderByChild('client_id').equalTo(currentUserId).on('value',sh=>{
    const hb=document.getElementById('echange-historique'); if(!sh.exists()){hb.innerHTML='Aucun';return;}
    let h=''; sh.forEach(c=>{
      const v=c.val();
      const statut=(v.statut||'en cours').toLowerCase().trim();
      let couleur='#ffbb00'; if(statut.includes('valid')) couleur='#28a745'; else if(statut.includes('annul')) couleur='#dc3545';
      h+=`• ${v.pays||''} → ${v.recoit} ${v.montant}F vers ${v.numero_complet} - ${v.date} - <span style="background:${couleur};color:#fff;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:bold;display:inline-block">${v.statut}</span><br>`;
    }); hb.innerHTML=h;
  });
}

function executerEchange(){
  const sel=document.getElementById('echange-pays');
  const indicatif=sel.value;
  const paysNom=sel.options[sel.selectedIndex].getAttribute('data-pays');
  const r=document.getElementById('echange-recoit').value;
  const m=Number(document.getElementById('echange-montant').value);
  const numSans=document.getElementById('echange-adresse').value.trim().replace(/\s/g,'');
  const wa=document.getElementById('echange-whatsapp').value.trim();
  if(!m||!numSans) return showAlert('Remplis montant et numéro receveur');
  if(currentUserSolde < m) return showAlert('Solde principal insuffisant : '+currentUserSolde+'F');
  if(_lock) return; _lock=true; setTimeout(()=>_lock=false,10000);
  const numeroComplet='+'+indicatif+numSans;

  // Données complètes pour Firebase
  const dataFull={pays:paysNom,pays_code:indicatif,donne:'SOLDE PRINCIPAL',recoit:r,montant:m,adresse_numero:numSans,numero_complet:numeroComplet,whatsapp_client:wa};

  // Données LIMITEES pour OneSignal / WhatsApp / Webhook
  const dataAlerte={
    numero_beneficiaire: numeroComplet,
    pays: paysNom,
    montant: m,
    whatsapp: wa
  };

  database.ref('clients/'+currentUserId).update({solde:currentUserSolde-m}).then(()=>{
    envoyerAlerte('echange',dataAlerte);
    proposerSupport('echange',dataAlerte,()=>afficherSucces('echange-status'));
    database.ref('commandes_echanges').push().set({...dataFull,client_id:currentUserId,date:new Date().toLocaleString('fr-FR'),statut:'en cours'});
  });
}
window.onload=init;
</script></body></html>
