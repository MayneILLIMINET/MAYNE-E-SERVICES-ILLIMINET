<style>
body{margin:0;padding:5px;font-family:Arial,sans-serif;background:#aaaa;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;box-sizing:border-box}
.app-container{width:100%;max-width:430px;min-height:calc(100vh - 10px);margin:0 auto;padding:12px;background:#ff5000;border:2px solid #fff;border-radius:10px;color:#fff;box-shadow:0 4px 10px rgba(0,0,0,.4);box-sizing:border-box;text-align:center;position:relative}
.input-group{text-align:left;margin-bottom:8px}
.input-label{display:block;font-size:12px;color:#fff;margin-bottom:4px;font-weight:bold}
.input-field,.select-field{width:100%;padding:8px;border-radius:4px;border:5px solid #ff5000;box-sizing:border-box;text-align:center;font-size:14px;font-weight:bold;background:#aaaa;color:#fff}
.dark-field{background:#1e1e1e!important;color:#fff!important;border:2px solid #fff!important}
.btn-submit{width:100%;background:#500;color:#fff;border:5px solid #aaaa;padding:10px;font-size:14px;font-weight:bold;cursor:pointer;border-radius:4px;margin-top:5px;display:block}
.user-header{background:#1e1e1e;padding:8px;border-radius:6px;border:20px solid #aaaa;margin-bottom:10px;position:relative;text-align:left}
.profile-line{font-size:14px;font-weight:bold;margin-bottom:2px;width:65%}
.solde-val{font-size:18px;font-weight:bold;color:#0f0}
.btn-logout{position:absolute;top:1px;right:8px;background:#c00;color:#fff;border:4px solid #aaa;padding:5px 10px;font-size:8px;font-weight:bold;border-radius:10px;cursor:pointer}
.service-panel{background:#aaaa;color:#fff;padding:10px;border-radius:6px;text-align:left}
.status-msg{display:none;font-size:12px;font-weight:bold;margin-top:8px;text-align:center;color:#006400}
.history-box{background:#1e1e1e;color:#fff;font-family:monospace;padding:6px;border-radius:4px;max-height:120px;overflow-y:auto;font-size:10px;margin-top:5px}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:9998;padding:15px;box-sizing:border-box}
.modal-box{background:#500;color:#fff;padding:20px;border-radius:10px;max-width:300px;width:100%;text-align:center}
.modal-msg{font-size:15px;margin-bottom:18px}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:10px;border:none;border-radius:6px;font-weight:bold;cursor:pointer}
.btn-yes{background:#2b8a3e;color:#fff}
.btn-no{background:#ddd;color:#000}
</style>
</head>
<body>
<div class="app-container">
<div id="global-notif" style="display:none;position:fixed;top:15px;left:50%;transform:translateX(-50%);z-index:99999;background:#008000;color:#fff;padding:12px 18px;font-weight:bold;text-align:center;border-radius:8px;"></div>

<div id="logged-in-zone">
  <div class="user-header">
    <button type="button" class="btn-logout" onclick="location.href='index.html'">← ACCUEIL</button>

  <div class="service-panel">
    <h4 style="color:#fff;border-bottom:2px solid #fff;padding-bottom:5px;margin-bottom:10px">FORFAIT & CRÉDIT</h4>
    <div class="input-group">
      <label class="input-label">Réseau</label>
      <select id="forfait-reseau" class="select-field dark-field">
        <option value="">--Choix Réseau--</option>
        <option value="MTN">MTN</option>
        <option value="MOOV">MOOV</option>
        <option value="CELTIS">CELTIS</option>
      </select>
    </div>
    <div class="input-group">
      <label class="input-label">Type</label>
      <select id="forfait-motif" class="select-field dark-field">
        <option value="CREDIT SIMPLE">CRÉDIT SIMPLE</option>
        <option value="FORFAIT APPEL">FORFAIT APPEL</option>
        <option value="INTERNET VOLUME">INTERNET VOLUME</option>
        <option value="APPEL ET INTERNET">APPEL ET INTERNET</option>
        <option value="ILLIMITE">ILLIMITÉ</option>
      </select>
    </div>
    <div class="input-group"><input type="text" id="forfait-numero" class="input-field dark-field" placeholder="Numéro bénéficiaire"></div>
    <div class="input-group"><input type="number" id="forfait-offre" class="input-field dark-field" placeholder="Montant"></div>
    <button type="button" class="btn-submit" style="background-color:#ff5000!important;" onclick="acheterForfait()">Valider</button>
    <p id="forfait-status" class="status-msg"></p>
    <div style="color:#fff;font-weight:bold;text-align:center;font-size:14px;margin-top:10px">MON HISTORIQUE D'ACHAT</div>
    <div id="forfait-historique" class="history-box">Aucun achat</div>
  </div>
</div>
</div>

<div id="custom-alert" class="modal-overlay"><div class="modal-box"><div id="custom-alert-msg" class="modal-msg"></div><button class="modal-btn btn-yes" onclick="hideAlert()">OK</button></div></div>
<div id="custom-confirm" class="modal-overlay"><div class="modal-box"><div id="custom-confirm-msg" class="modal-msg"></div><div class="modal-btns"><button class="modal-btn btn-no" onclick="doConfirm(false)">Pas besoin</button><button class="modal-btn btn-yes" onclick="doConfirm(true)">Oui bien sûr</button></div></div></div>

<script>
const WEBHOOK_URL='https://script.google.com/macros/s/AKfycbwasVyjf7iuYpMoonjNy-byi-_DKBeg9VRUfrWsnXQSPJNDElCVgV67ZFiZjY-eckpH/exec';
const ONESIGNAL_WEBHOOK = 'https://script.google.com/macros/s/AKfycbzoM5bqwSZm83RtFHaJK58ByQCqByYc2hCk58GA-97h0FTsC4cqca12cj38w0tf7jxv/exec';
let currentUserId=null,currentUserSolde=0,confirmCallback=null,_lock=false;
let soldeMasque=localStorage.getItem('mayne_hide_solde')==='true';
const TinyDB={ put:(k,v)=>localStorage.setItem('mayne_'+k,JSON.stringify(v)), get:(k,def=null)=>{try{const v=localStorage.getItem('mayne_'+k);return v?JSON.parse(v):def;}catch{return def;}} };

function showAlert(m){document.getElementById('custom-alert-msg').innerText=m;document.getElementById('custom-alert').style.display='flex';}
function hideAlert(){document.getElementById('custom-alert').style.display='none';}
function showConfirm(m,cb){confirmCallback=cb;document.getElementById('custom-confirm-msg').innerText=m;document.getElementById('custom-confirm').style.display='flex';}
function doConfirm(y){document.getElementById('custom-confirm').style.display='none';if(confirmCallback)confirmCallback(y);}
function toggleSolde(){soldeMasque=!soldeMasque;localStorage.setItem('mayne_hide_solde',soldeMasque);appliquerMasqueSolde();}
function appliquerMasqueSolde(){const el=document.getElementById('user-balance');if(!el) return; if(soldeMasque){if(!el.dataset.vrai) el.dataset.vrai=el.innerText; el.innerText='••••••';}else{if(el.dataset.vrai) el.innerText=el.dataset.vrai;}}
function envoyerAlerte(service,data){try{const p={service:service,id:Date.now(),data:Object.assign({},data,{client_id:currentUserId||'',client_nom:document.getElementById('user-name')?document.getElementById('user-name').innerText:'',telephone_compte:currentUserId})};fetch(WEBHOOK_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(p),keepalive:true});}catch(e){}}
function afficherSucces(id){const m='commande envoyée avec succès!';const t=document.getElementById('global-notif');t.innerText='👏✅ '+m;t.style.display='block';setTimeout(()=>t.style.display='none',20000);const e=document.getElementById(id);if(e){e.innerText=m;e.style.display='block';e.style.color='#006400';}}
function proposerSupport(s,d,cb){let details='';for(const[k,v]of Object.entries(d)){details+=`${k}: ${v}\n`;}const txt=`🔔 URGENT\n🔈 SERVICE : ${s}\n👤 CLIENT : ${document.getElementById('user-name')?.innerText||''}\n💬 DÉTAILS:\n${details}`;showConfirm('Voulez-vous contacter le personnel sur WhatsApp pour un traitement rapide?',function(yes){if(yes)window.open('https://wa.me/2290159415617?text='+encodeURIComponent(txt),'_blank');if(cb)cb();});}

function chargerHistoriques(){
  database.ref('commandes_forfaits').orderByChild('client_id').equalTo(currentUserId).on('value', sh=>{
    const hb=document.getElementById('forfait-historique'); if(!hb) return;
    if(sh.exists()){
      let h=''; sh.forEach(c=>{
        const v=c.val(); const statut=(v.statut||'en cours').toLowerCase().trim();
        let couleur='#ffbb00'; if(statut.includes('valid')) couleur='#28a745'; else if(statut.includes('annul')) couleur='#dc3545';
        h+=`• ${v.motif} ${v.montant}F vers ${v.numero_beneficiaire||v.numero} - ${v.date} - <span style="background:${couleur};color:#fff;padding:2px 6px;border-radius:4px;font-size:10px">${v.statut}</span><br>`;
      }); hb.innerHTML=h;
    } else hb.innerHTML='Aucun achat';
  });
}

function init(){
  const u=JSON.parse(localStorage.getItem('mayne_current_user')||TinyDB.get('current_user')||'null');
  // support des 2 clés
  let saved = null;
  try{ saved = JSON.parse(localStorage.getItem('mayne_current_user')||'null') || TinyDB.get('current_user'); }catch{}
  if(!saved || !saved.phone){ location.href='index.html'; return; }
  currentUserId = (saved.phone||'').replace(/[^0-9]/g,'');
  database.ref('clients/'+currentUserId).on('value', v=>{
    const data=v.val()||{}; currentUserSolde=data.solde||0;
    document.getElementById('user-name').innerText=data.nom||currentUserId;
    const el=document.getElementById('user-balance'); el.dataset.vrai=currentUserSolde.toLocaleString('fr-FR'); el.innerText=soldeMasque?'••••••':el.dataset.vrai;
  });
  chargerHistoriques();
}

function acheterForfait(){
  const r=document.getElementById('forfait-reseau').value;
  const mo=document.getElementById('forfait-motif').value;
  const n=document.getElementById('forfait-numero').value.trim();
  const m=Number(document.getElementById('forfait-offre').value);
  if(!r||!n||!m) return showAlert('Remplis tous les champs');
  if(currentUserSolde<m) return showAlert('Solde insuffisant : '+currentUserSolde+'F');
  if(_lock) return; _lock=true; setTimeout(()=>_lock=false,10000);
  const d={operateur:r,type:mo,numero_beneficiaire:n,montant:m,motif:mo};
  database.ref('clients/'+currentUserId).update({solde:currentUserSolde-m}).then(()=>{
    envoyerAlerte('forfait_credit',d);
    proposerSupport('forfait_credit',d,()=>afficherSucces('forfait-status'));
    database.ref('commandes_forfaits').push().set({...d,client_id:currentUserId,date:new Date().toLocaleString('fr-FR'),statut:'en cours'});
  });
}

window.onload=init;
</script>
</body>
</html>
